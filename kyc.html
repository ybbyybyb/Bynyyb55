<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>KYC</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#000;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif}input,button{font:inherit}button{border:0;cursor:pointer}.app{max-width:430px;min-height:100vh;margin:auto;padding:14px 16px 24px;position:relative}.top{display:flex;align-items:center;gap:10px;justify-content:center;position:relative;padding:8px 0 18px}.back{position:absolute;left:0;top:6px;background:none;color:#fff;font-size:28px;line-height:1}.ttl{font-size:26px;font-weight:500}.lbl{font-size:18px;margin:20px 0 10px}.field,.sel,.search{width:100%;height:58px;border-radius:14px;background:#0d120f;border:1px solid #111;color:#dcdcdc;padding:0 16px;font-size:18px;outline:none}.sel{display:flex;align-items:center;justify-content:space-between}.ph{color:#8c8c8c}.arr{opacity:.55;font-size:16px}.err{color:#ba6f54;font-size:15px;margin:8px 6px 0}.btn{width:100%;height:58px;border-radius:30px;margin-top:34px;background:linear-gradient(90deg,#8d7a5e,#b79356);color:#1a1a1a;font-size:22px;font-weight:500}.hide{display:none}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding-top:110px;z-index:20}.modal.sh{display:flex}.sheet{width:min(430px,100vw);max-height:78vh;background:#0d120f;border-radius:18px 18px 0 0;overflow:hidden;border-top:1px solid #1d1d1d}.mhd{display:flex;justify-content:space-between;align-items:center;padding:18px 16px;border-bottom:1px solid #262626;font-size:18px}.cancel{color:#f2d9a3;background:none}.searchWrap{padding:14px 16px;border-bottom:1px solid #1b1b1b}.search{background:#141814;border-color:#2a2a2a;color:#fff}.list{max-height:58vh;overflow:auto}.row{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #1a1a1a;font-size:17px;color:#f2f2f2}.code{opacity:.95;direction:ltr}.row.active{background:#111713}.card{height:138px;background:#0d120f;border:1px solid #1b1b1b;border-radius:14px;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:20px;overflow:hidden}.imgBox{width:48%;height:100%;display:flex;align-items:center;justify-content:center}.imgBox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px}.addBtn{width:68px;height:68px;background:none;padding:0}.addBtn img{width:68px;height:68px;object-fit:contain}.subttl{font-size:18px;margin:18px 0 12px}.submit{margin-top:18px}.done{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center}.done.sh{display:flex}.ic{width:92px;height:92px;border-radius:50%;background:linear-gradient(180deg,#f1d391,#b9904e);display:grid;place-items:center;box-shadow:0 0 0 8px rgba(241,211,145,.08)}.ic svg{width:44px;height:44px;fill:none;stroke:#1d1d1d;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.rv{font-size:28px;font-weight:600}.note{color:#c8b48d;font-size:15px}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:10px}</style></head><body><div class="app"><section id="p1"><div class="top"><button class="back">‹</button><div class="ttl">المعلومات الشخصية</div></div><div class="lbl">الجنسية</div><button class="sel" id="openCountry"><span id="countryTxt">الجزائر</span><span class="arr">▼</span></button><div class="lbl">نوع المستند</div><button class="sel" id="openDoc"><span id="docTxt">بطاقة الهوية</span><span class="arr">▶</span></button><div class="hide" id="docMenu" style="margin-top:8px;display:none"><button class="sel docOpt" style="margin-bottom:8px"><span>بطاقة الهوية</span></button><button class="sel docOpt" style="margin-bottom:8px"><span>جواز السفر</span></button><button class="sel docOpt"><span>رخصة القيادة</span></button></div><input id="idNum" class="field" placeholder="يرجى إدخال رقم هويتك" style="margin-top:12px"><div class="err" id="idErr">يرجى إدخال رقم هويتك</div><button class="btn" id="next">الخطوة التالية</button></section><section id="p2" class="hide"><div class="top"><button class="back" id="back2">‹</button><div class="ttl" style="font-size:24px">التحقق من هوية العميل (kyc)</div></div><div class="subttl">صورة الهوية (أمامية)</div><div class="card"><label class="imgBox" for="f1"><img id="i1" src="https://h5.iuxp.com/assets/idCard_front-46e1ba30.png"></label><button class="addBtn" onclick="f1.click()"><img src="https://h5.iuxp.com/assets/add-7d5c489c.png"></button><input id="f1" type="file" accept="image/*" hidden></div><div class="subttl">صورة الوثيقة (الجانب الخلفي)</div><div class="card"><label class="imgBox" for="f2"><img id="i2" src="https://h5.iuxp.com/assets/idCard_back-73814029.png"></label><button class="addBtn" onclick="f2.click()"><img src="https://h5.iuxp.com/assets/add-7d5c489c.png"></button><input id="f2" type="file" accept="image/*" hidden></div><div class="subttl">صورة مع وثيقة الهوية</div><div class="card"><label class="imgBox" for="f3"><img id="i3" src="https://h5.iuxp.com/assets/handheld_idCard-3195cf65.png"></label><button class="addBtn" onclick="f3.click()"><img src="https://h5.iuxp.com/assets/add-7d5c489c.png"></button><input id="f3" type="file" accept="image/*" hidden></div><button class="btn submit" id="send">تقديم</button></section><section id="p3" class="done"><div class="ic"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="8"/></svg></div><div class="rv">قيد مراجعة</div><div class="note">تم إرسال البيانات بنجاح</div></section></div><div class="modal" id="countryModal"><div class="sheet"><div class="mhd"><button class="cancel" id="closeCountry">إلغاء</button><div>اختر الدولة/المنطقة</div></div><div class="searchWrap"><input class="search" id="countrySearch" placeholder="ابحث عن دولة أو عنوان"></div><div class="list" id="countryList"></div></div></div><script>let C=[["أفغانستان","+93"],["Shqipëri","+355"],["الجزائر","+213"],["American Samoa","+1684"],["Andorra","+376"],["Angola","+244"],["Anguilla","+1264"],["Antigua and Barbuda","+1268"],["Argentina","+54"],["Հայաստան","+374"],["Aruba","+297"],["Australia","+61"],["Austria","+43"],["Azerbaijan","+994"],["Bahrain","+973"],["Bangladesh","+880"],["Belarus","+375"],["Belgium","+32"],["Benin","+229"],["Bosnia and Herzegovina","+387"]],country="الجزائر";let q=s=>document.querySelector(s),qa=s=>document.querySelectorAll(s);function countries(v=""){q("#countryList").innerHTML=C.filter(x=>x[0].toLowerCase().includes(v.toLowerCase())||x[1].includes(v)).map(x=>`<div class="row ${x[0]==country?"active":""}" data-n="${x[0]}"><span>${x[0]}</span><span class="code">${x[1]}</span></div>`).join("")}countries();q("#openCountry").onclick=()=>q("#countryModal").classList.add("sh");q("#closeCountry").onclick=()=>q("#countryModal").classList.remove("sh");q("#countrySearch").oninput=e=>countries(e.target.value);q("#countryList").onclick=e=>{let r=e.target.closest(".row");if(!r)return;country=r.dataset.n;q("#countryTxt").textContent=country;q("#countryModal").classList.remove("sh");countries(q("#countrySearch").value)};q("#openDoc").onclick=()=>q("#docMenu").style.display=q("#docMenu").style.display=="none"?"block":"none";qa(".docOpt").forEach(b=>b.onclick=()=>{q("#docTxt").textContent=b.innerText.trim();q("#docMenu").style.display="none"});function valid(){let ok=q("#idNum").value.trim();q("#idErr").style.visibility=ok?"hidden":"visible";return ok}q("#idNum").oninput=valid;q("#next").onclick=()=>{if(valid()){q("#p1").classList.add("hide");q("#p2").classList.remove("hide")}};q("#back2").onclick=()=>{q("#p2").classList.add("hide");q("#p1").classList.remove("hide")};function up(f,i){f.onchange=()=>{let file=f.files[0];if(file)q(i).src=URL.createObjectURL(file)}}up(f1,"#i1");up(f2,"#i2");up(f3,"#i3");q("#send").onclick=()=>{if(!f1.files[0]||!f2.files[0]||!f3.files[0])return alert("يرجى إدخال جميع الصور");q("#p2").classList.add("hide");q("#p3").classList.add("sh")};</script></body></html>
