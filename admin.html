function renderUsers(){let q=str($('q').value).toLowerCase(),a=US.filter(u=>!q||JSON.stringify(u).toLowerCase().includes(q)).sort((a,b)=>ts(b.createdAt)-ts(a.createdAt));return a.length?`<div class="list">${a.map(u=>`<div class="row"><div class="r1"><div><div class="tt">${esc(u.email||'-')}</div><div class="sub">${esc(u.name||'')}</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="st ${u.banned?'rejected':'success'}">${u.banned?'محظور':'نشط'}</span><span class="st pending">${esc(u.role||'user')}</span></div></div><div class="meta">الرصيد: ${money(uBal(u))}<br>الإيداع: ${money(uDep(u))}</div><div class="acts"><button class="b s y" onclick="editUser('${esc(u.id)}')">تعديل</button><button class="b s ${u.banned?'g':'r'}" onclick="ban('${esc(u.id)}',${u.banned?0:1})">${u.banned?'فك الحظر':'حظر'}</button></div></div>`).join('')}</div>`:'<div class="empty">لا يوجد مستخدمون</div>'}
function renderAddr(){let q=str($('q').value).toLowerCase(),docs=BIND.filter(x=>!q||JSON.stringify(x).toLowerCase().includes(q)),rows=ADDR.filter(x=>!q||JSON.stringify(x).toLowerCase().includes(q));return`<div class="list"><div class="row"><div class="r1"><div><div class="tt">كل ما داخل binolla</div><div class="sub">عرض شامل لكل مستندات القاعدة + استخراج كل العناوين/الشبكات الموجودة بداخلها بدون أي عناوين ثابتة</div></div><button class="b g s" onclick="addAddrDoc()">+ إضافة مستند</button></div><div class="meta">عدد المستندات: ${BIND.length} | عدد العناوين المستخرجة: ${ADDR.length}</div></div><div class="row"><div class="tt" style="margin-bottom:10px">العناوين والشبكات المستخرجة من binolla</div><div class="addr">${rows.length?rows.map(x=>`<div class="ar"><div class="ah"><div class="an"><div class="ai">${esc(icoOf(x))}</div><div><div class="nm">${esc(x.network||x.name||x.path)}</div><div class="nt">doc: ${esc(x.docId)} | path: ${esc(x.path)}${x.enabled===false?' | معطل':''}</div></div></div><span class="st ${x.enabled===false?'rejected':'success'}">${x.enabled===false?'معطل':'مفعّل'}</span></div><div class="av">${esc(x.address||'')}</div></div>`).join(''):'<div class="empty">لا توجد عناوين مستخرجة حالياً</div>'}</div></div><div class="row"><div class="tt" style="margin-bottom:10px">مستندات binolla كاملة (تحرير مباشر)</div><div class="addr">${docs.length?docs.map(v=>`<div class="ar"><div class="ah"><div><div class="nm">${esc(v.id)}</div><div class="nt">محتوى المستند كامل</div></div></div><textarea id="json_${sid(v.id)}" class="i" style="min-height:240px">${esc(J(v.data))}</textarea><div class="acts"><button class="b g s" onclick="saveAddrDoc('${esc(v.id)}')">حفظ JSON</button><button class="b r s" onclick="delAddrDoc('${esc(v.id)}')">حذف المستند</button></div></div>`).join(''):'<div class="empty">لا توجد مستندات داخل binolla</div>'}</div></div></div>`}
window.renderAdmin=()=>{if(!isAdmin)return;let c=filt();$('cDep').textContent=c.dep.length;$('cWit').textContent=c.wit.length;$('cUsr').textContent=US.length;$('cAdr').textContent=ADDR.length||BIND.length;let h='';if(adminTab=='users')h=renderUsers();else if(adminTab=='addresses')h=renderAddr();else{let a=adminTab=='deposit'?c.dep:c.wit;h=a.length?`<div class="list">${a.map(t=>txCard(t,1)).join('')}</div>`:'<div class="empty">لا توجد طلبات</div>'}$('adminContent').innerHTML=h};
window.tab=(t,b)=>{adminTab=t;document.querySelectorAll('.adminBar .tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderAdmin()};
window.req=async type=>{if(!ME)return;if(UD.banned)return toast('الحساب محظور');let amount=+(type=='deposit'?$('dAmount').value:$('wAmount').value);if(!(amount>0))return toast('أدخل المبلغ');let method='',address='',note='';if(type=='deposit'){let x=ADDR.find(v=>v.id==$('dNet').value)||ADDR.find(v=>v.enabled!==false&&v.address);if(!x)return toast('لا توجد عناوين إيداع متاحة ضمن binolla');method=x.network||x.name||x.path||x.docId;address=str(x.address);note=str($('dNote').value)}else{method=str($('wMethod').value);address=str($('wAddr').value);note=str($('wNote').value);if(!method||!address)return toast('أكمل كل البيانات');if(amount>uBal(UD))return toast('الرصيد غير كاف')}await addDoc(collection(db,'tx'),{uid:ME.uid,userId:ME.uid,email:ME.email,userEmail:ME.email,type,requestType:type,amount,value:amount,method,currency:method,address,wallet:address,status:'pending',state:'pending',note,createdAt:serverTimestamp()});['dAmount','dNote','wAmount','wMethod','wAddr','wNote'].forEach(id=>$(id)&&($(id).value=''));updDAddr();toast('تم إرسال الطلب')};
async function getUserRef(t){if(t.uid){let r=doc(db,'users',t.uid),s=await getDoc(r);if(s.exists())return r}if(t.email){let q=await getDocs(query(collection(db,'users'),where('email','==',t.email)));if(!q.empty)return q.docs[0].ref}return null}
async function applyDelta(t,ns,na){let r=await getUserRef(t);if(!r)return;let s=await getDoc(r),u=s.data()||{},o=eff(t.type,t.status,+t.amount||0),n=eff(t.type,ns,+na||0),bal=uBal(u)+(n.bal-o.bal),dep=uDep(u)+(n.dep-o.dep);if(bal<0)throw Error('لا يمكن جعل الرصيد سالباً');await updateDoc(r,{balance:bal,deposit:Math.max(0,dep)})}
window.setStatus=async(k,st)=>{if(!isAdmin)return;let t=TXM[k];if(!t)return;try{await applyDelta(t,st,+t.amount||0);await updateDoc(t.ref,{status:st,state:st,approval:st,result:st,updatedAt:serverTimestamp()});toast('تم التحديث')}catch(e){toast(e.message||'خطأ')}};
window.editTx=async k=>{if(!isAdmin)return;let t=TXM[k];if(!t)return;let na=+prompt('المبلغ',t.amount||0),ns=str(prompt('الحالة: pending/success/rejected',t.status||'pending')||t.status),addr=prompt('العنوان',t.address||'')??t.address,note=prompt('ملاحظة',t.note||'')??t.note,method=prompt('الطريقة',t.method||'')??t.method;if(!(na>0)||!['pending','success','rejected'].includes(ns))return;try{await applyDelta(t,ns,na);await updateDoc(t.ref,{amount:na,value:na,status:ns,state:ns,approval:ns,result:ns,address:addr,wallet:addr,note,method,currency:method,updatedAt:serverTimestamp()});toast('تم التعديل')}catch(e){toast(e.message||'خطأ')}};
window.ban=async(uid,v)=>{if(!isAdmin)return;await updateDoc(doc(db,'users',uid),{banned:!!v});toast(v?'تم الحظر':'تم فك الحظر')};
window.editUser=async uid=>{if(!isAdmin)return;let r=doc(db,'users',uid),s=await getDoc(r);if(!s.exists())return;let u=s.data()||{},bal=+prompt('الرصيد',uBal(u)),dep=+prompt('إجمالي الإيداع المقبول',uDep(u)),role=str(prompt('role: admin/user',u.role||'user')||u.role);if(isNaN(bal)||isNaN(dep)||!['admin','user'].includes(role))return;await updateDoc(r,{balance:bal,deposit:dep,role});toast('تم الحفظ')};
window.saveAddrDoc=async id=>{if(!isAdmin)return;try{let o=JSON.parse($('json_'+sid(id)).value);await setDoc(doc(db,ADDRCOL,id),o);toast('تم حفظ المستند')}catch(e){toast('JSON غير صالح')}};
window.delAddrDoc=async id=>{if(!isAdmin)return;if(!confirm('حذف المستند؟'))return;await deleteDoc(doc(db,ADDRCOL,id));toast('تم الحذف')};
window.addAddrDoc=async()=>{if(!isAdmin)return;let id=str(prompt('معرف المستند الجديد',''));if(!id)return;await setDoc(doc(db,ADDRCOL,id),{createdAt:serverTimestamp()},{merge:true});toast('تمت الإضافة')};
onAuthStateChanged(auth,async u=>{offMe();offUs();offAd();stopTx();if(!u){ME=null;UD={};US=[];ADDR=[];BIND=[];isAdmin=0;show(0);return}ME=u;UD=await fixRole(u);isAdmin=UD.role=='admin'||u.email==AE;show(1);paint();offMe=onSnapshot(doc(db,'users',u.uid),s=>{UD=s.data()||{};paint();UD.banned&&signOut(auth)});startTx();startAddr();if(isAdmin)offUs=onSnapshot(collection(db,'users'),s=>{US=[];s.forEach(d=>US.push({id:d.id,...d.data()}));renderAdmin()})});
</script></body></html>
