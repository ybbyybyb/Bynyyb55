<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GLOBAL VIP</title><style>

.card,.panel{background:linear-gradient(180deg,#171028,#120b20);border:1px solid var(--bd);border-radius:24px;padding:16px;box-shadow:inset 0 0 0 1px #ffffff08,0 8px 30px #0004}
.n{font-size:34px;font-weight:900}
.search{width:100%;padding:16px 18px;border-radius:22px;background:linear-gradient(180deg,#160f26,#110a1d);border:1px solid #7442ff55;color:#fff;margin-bottom:12px}
.list{display:grid;gap:10px}
.row{background:linear-gradient(180deg,#160f24,#110a1d);border:1px solid #7240ff44;border-radius:20px;padding:14px}
.r1{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.tt{font-weight:900}.sub,.mut{color:var(--mut);font-size:13px}

</style></head><body>

<main id="app" class="x"><div class="w">

<script type="module">

import{getFirestore,doc,getDoc,setDoc,updateDoc,collection,addDoc,onSnapshot,serverTimestamp,query,where,getDocs,deleteDoc}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const cfg={apiKey:'AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg',authDomain:'hhhxh-5ebe4.firebaseapp.com',projectId:'hhhxh-5ebe4',storageBucket:'hhhxh-5ebe4.firebasestorage.app',messagingSenderId:'79243000696',appId:'1:79243000696:web:ee0fb2d2ccce791954e68d',measurementId:'G-08BR6LN6PT'},AE='12345a@gmail.com',AP='123456',TXCOLS=['tx','transactions','requests','deposits','withdraws','withdrawals'],ADDRCOL='binolla',app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),$=e=>document.getElementById(e);
let M='login',ME=null,UD={},US=[],TX=[],TXM={},ADDR=[],SRC={},isAdmin=0,adminTab='deposit',offMe=()=>{},offUs=()=>{},offAd=()=>{},offTx=[],seeded=0;
const str=v=>(v??'').toString().trim(),num=(...a)=>{for(let v of a){let n=parseFloat(str(v).replace(/[^\d.-]/g,''));if(!isNaN(n))return n}return 0},money=n=>(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),pad=n=>String(n).padStart(2,'0'),ts=v=>!v?0:typeof v=='number'?(v<1e12?v*1e3:v):typeof v=='string'?(Date.parse(v)||0):v instanceof Date?+v:v.toDate?+v.toDate():v.seconds?v.seconds*1e3+((v.nanoseconds||0)/1e6|0):0,dt=v=>{let d=new Date(ts(v)||Date.now());return`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`},pick=(o,k,d='')=>{for(let x of k){let v=o?.[x];if(v!==undefined&&v!==null&&v!=='')return v}return d},typ=(o,s='')=>{let v=str(pick(o,['type','txType','requestType','kind','category'],s)).toLowerCase();return/dep|deposit|ايداع|إيداع/.test(v)?'deposit':/with|withdraw|سحب/.test(v)?'withdraw':''},stat=v=>{v=str(v).toLowerCase();return/success|accepted|approved|done|completed|paid|ok|مقبول|مكتمل|ناجح/.test(v)?'success':/reject|declin|cancel|fail|رفض|مرفوض/.test(v)?'rejected':'pending'},esc=s=>str(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),toast=t=>alert(t),uBal=u=>num(u.balance,u.bal),uDep=u=>num(u.deposit,u.totalDeposit,u.acceptedDeposits),eff=(t,s,a)=>s!='success'?{bal:0,dep:0}:t=='deposit'?{bal:+a,dep:+a}:{bal:-a,dep:0};

window.mode=(m)=>{M=m;$('am').textContent=m=='login'?'تسجيل الدخول':'إنشاء حساب';$('name').classList.toggle('x',m=='login');$('loginTab').classList.toggle('on',m=='login');$('regTab').classList.toggle('on',m=='register')};

async function mkUser(u,name,pass){let r=doc(db,'users',u.uid),s=await getDoc(r);if(s.exists())return s.data();let role=u.email==AE&&pass==AP?'admin':'user',d={name:name||'',email:u.email||'',role,balance:0,deposit:0,banned:false,createdAt:serverTimestamp()};await setDoc(r,d,{merge:true});return d}
window.goAuth=async()=>{let email=str($('email').value),pass=str($('pass').value),name=str($('name').value);if(!email||!pass)return toast('أكمل البريد وكلمة المرور');try{if(M=='register'){let r=await createUserWithEmailAndPassword(auth,email,pass);await mkUser(r.user,name,pass)}else{let r=await signInWithEmailAndPassword(auth,email,pass),ref=doc(db,'users',r.user.uid),s=await getDoc(ref);!s.exists()?await mkUser(r.user,'',pass):r.user.email==AE&&s.data().role!='admin'&&await updateDoc(ref,{role:'admin'})}}catch(e){toast(e.message)}};
window.logout=()=>signOut(auth);

async function fixRole(u){let r=doc(db,'users',u.uid),s=await getDoc(r);if(!s.exists())return mkUser(u,'','');let d=s.data()||{};if(u.email==AE&&d.role!='admin'){await updateDoc(r,{role:'admin'});d.role='admin'}return d}
function show(v){$('auth').classList.toggle('x',v);$('app').classList.toggle('x',!v)}
function paint(){$('who').textContent=ME?.email||'';$('role').textContent=isAdmin?'admin':'user';$('bal').textContent=money(uBal(UD));$('dep').textContent=money(uDep(UD));$('banState').textContent=UD.banned?'محظور':'نشط';$('adminWrap').classList.toggle('x',!isAdmin);$('userView').classList.toggle('x',isAdmin)}

function norm(s,src){let o=s.data(),type=typ(o,src);if(!type)return null;let c=pick(o,['createdAt','timestamp','date','time','created_at','ts','submittedAt','updatedAt']),t={k:src+'__'+s.id,id:s.id,src,ref:s.ref,uid:str(pick(o,['uid','userId','user_id','ownerId','clientId'])),email:str(pick(o,['email','userEmail','user_email','mail'])),type,amount:num(o.amount,o.value,o.sum,o.total,o.usdt,o.money,o.price),method:str(pick(o,['method','currency','network','coin','paymentMethod','chain','walletType'])),address:str(pick(o,['address','addr','wallet','walletAddress','to','destination','account'])),note:str(pick(o,['note','message','details','remark','memo'])),status:stat(pick(o,['status','state','approval','result'],'pending')),createdAt:c,sort:ts(c),raw:o};if(!t.uid&&ME&&t.email&&t.email==ME.email)t.uid=ME.uid;return t}
function stopTx(){offTx.forEach(f=>f&&f());offTx=[];SRC={};TX=[];TXM={};renderMine();renderAdmin()}
function rebuild(){let a=Object.values(SRC).flat().filter(Boolean),m={};for(let t of a){let k=str(pick(t.raw,['txId','requestId','externalId']))||[t.uid,t.email,t.type,t.amount,t.method,t.address,t.sort].join('|');if(!m[k]||t.src=='tx')m[k]=t}TX=Object.values(m).sort((a,b)=>b.sort-a.sort);TXM={};TX.forEach(t=>TXM[t.k]=t);renderMine();renderAdmin()}
function startTx(){stopTx();TXCOLS.forEach(c=>offTx.push(onSnapshot(collection(db,c),s=>{SRC[c]=[];s.forEach(d=>{let x=norm(d,c);x&&SRC[c].push(x)});rebuild()},()=>{})))}
async function seedAddr(){if(seeded)return;seeded=1;for(let x of[{id:'trc20',name:'USDT TRC20',icon:'💠',address:'ضع هنا عنوان TRC20',enabled:true},{id:'bep20',name:'USDT BEP20',icon:'🟡',address:'ضع هنا عنوان BEP20',enabled:true},{id:'erc20',name:'USDT ERC20',icon:'🔷',address:'ضع هنا عنوان ERC20',enabled:false}])await setDoc(doc(db,ADDRCOL,x.id),{...x,createdAt:serverTimestamp(),updatedAt:serverTimestamp()},{merge:true})}
function startAddr(){offAd&&offAd();offAd=onSnapshot(collection(db,ADDRCOL),s=>{ADDR=[];s.forEach(d=>ADDR.push({id:d.id,...d.data()}));if(!ADDR.length&&isAdmin)seedAddr();ADDR.sort((a,b)=>ts(b.updatedAt||b.createdAt)-ts(a.updatedAt||a.createdAt));fillNets();renderAdmin()})}
function fillNets(){let a=ADDR.filter(x=>x.enabled!==false),s=$('dNet');if(!s)return;s.innerHTML=a.length?a.map(x=>`<option value="${esc(x.id)}">${esc(x.name||'بدون اسم')}</option>`).join(''):'<option value="">لا توجد عناوين إيداع</option>';updDAddr()}
window.updDAddr=()=>{let s=$('dNet');if(!s)return;let x=ADDR.find(v=>v.id==s.value)||ADDR.find(v=>v.enabled!==false);$('dAddr').value=x?x.address||'':''}
document.addEventListener('change',e=>{if(e.target&&e.target.id=='dNet')updDAddr()});

function txCard(t,a=0){let st=t.status||'pending';return`<div class="row"><div class="r1"><div><div class="tt">${t.type=='deposit'?'إيداع':'سحب'} - ${money(t.amount)}</div><div class="sub">${esc(t.email||'')}</div></div><span class="st ${st}">${st=='pending'?'قيد المعالجة':st=='success'?'مقبول':'مرفوض'}</span></div><div class="meta">الطريقة: ${esc(t.method||'-')}<br>العنوان: ${esc(t.address||'-')}<br>التاريخ: ${dt(t.createdAt)}${t.note?`<br>ملاحظة: ${esc(t.note)}`:''}</div>${a?`<div class="acts"><button class="b s g" onclick="setStatus('${esc(t.k)}','success')">قبول</button><button class="b s r" onclick="setStatus('${esc(t.k)}','rejected')">رفض</button><button class="b s y" onclick="editTx('${esc(t.k)}')">تعديل</button></div>`:''}</div>`}
function renderMine(){if(isAdmin){let m=$('mine');if(m)m.innerHTML='';return}let a=!ME?[]:TX.filter(t=>t.uid==ME.uid||t.email==ME.email).sort((a,b)=>b.sort-a.sort);let m=$('mine');if(m)m.innerHTML=a.length?a.map(v=>txCard(v)).join(''):'<div class="empty">لا توجد طلبات</div>'}
function filt(){let q=str($('q')?.value).toLowerCase(),all=TX.filter(t=>!q||JSON.stringify(t).toLowerCase().includes(q));return{all,dep:all.filter(t=>t.type=='deposit'),wit:all.filter(t=>t.type=='withdraw')}}
function renderUsers(){let q=str($('q').value).toLowerCase(),a=US.filter(u=>!q||JSON.stringify(u).toLowerCase().includes(q)).sort((a,b)=>ts(b.createdAt)-ts(a.createdAt));return a.length?`<div class="list">${a.map(u=>`<div class="row"><div class="r1"><div><div class="tt">${esc(u.email||'-')}</div><div class="sub">${esc(u.name||'')}</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="st ${u.banned?'rejected':'success'}">${u.banned?'محظور':'نشط'}</span><span class="st pending">${esc(u.role||'user')}</span></div></div><div class="meta">الرصيد: ${money(uBal(u))}<br>الإيداع: ${money(uDep(u))}</div><div class="acts"><button class="b s y" onclick="editUser('${esc(u.id)}')">تعديل</button><button class="b s ${u.banned?'g':'r'}" onclick="ban('${esc(u.id)}',${u.banned?0:1})">${u.banned?'فك الحظر':'حظر'}</button></div></div>`).join('')}</div>`:'<div class="empty">لا يوجد مستخدمون</div>'}
function renderAddr(){return`<div class="list"><div class="row"><div class="r1"><div><div class="tt">عناوين الدفع (قاعدة binolla)</div><div class="sub">جميع العناوين المحفوظة - تعديل وحفظ مباشر</div></div><button class="b g s" onclick="addAddr()">إضافة عنوان</button></div></div><div class="addr">${ADDR.length?ADDR.map(a=>`<div class="ai"><div class="ico"><input id="ico_${esc(a.id)}" class="i" value="${esc(a.icon||'💳')}" style="padding:7px;text-align:center;height:52px"></div><div class="ag"><input id="name_${esc(a.id)}" class="i" value="${esc(a.name||'')}" placeholder="اسم الشبكة"><input id="address_${esc(a.id)}" class="i" value="${esc(a.address||'')}" placeholder="العنوان"></div><div style="display:grid;gap:8px"><button class="b g s" onclick="saveAddr('${esc(a.id)}')">حفظ</button><button class="b y s" onclick="toggleAddr('${esc(a.id)}',${a.enabled===false?1:0})">${a.enabled===false?'تفعيل':'تعطيل'}</button><button class="b r s" onclick="delAddr('${esc(a.id)}')">حذف</button></div></div>`).join(''):'<div class="empty">لا توجد عناوين بعد</div>'}</div></div>`}
window.renderAdmin=()=>{if(!isAdmin)return;let c=filt();$('cDep').textContent=c.dep.length;$('cWit').textContent=c.wit.length;$('cUsr').textContent=US.length;$('cAdr').textContent=ADDR.length;let h='';if(adminTab=='users')h=renderUsers();else if(adminTab=='addresses')h=renderAddr();else{let a=adminTab=='deposit'?c.dep:c.wit;h=a.length?`<div class="list">${a.map(t=>txCard(t,1)).join('')}</div>`:'<div class="empty">لا توجد طلبات</div>'}$('adminContent').innerHTML=h}
window.tab=(t,b)=>{adminTab=t;document.querySelectorAll('.adminBar .tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderAdmin()}

window.req=async type=>{if(!ME)return;if(UD.banned)return toast('الحساب محظور');let amount=+(type=='deposit'?$('dAmount').value:$('wAmount').value);if(!(amount>0))return toast('أدخل المبلغ');let method='',address='',note='';if(type=='deposit'){let x=ADDR.find(v=>v.id==$('dNet').value)||ADDR.find(v=>v.enabled!==false);if(!x)return toast('لا توجد عناوين إيداع متاحة');method=str(x.name);address=str(x.address);note=str($('dNote').value)}else{method=str($('wMethod').value);address=str($('wAddr').value);note=str($('wNote').value);if(!method||!address)return toast('أكمل كل البيانات');if(amount>uBal(UD))return toast('الرصيد غير كاف')}await addDoc(collection(db,'tx'),{uid:ME.uid,userId:ME.uid,email:ME.email,userEmail:ME.email,type,requestType:type,amount,value:amount,method,currency:method,address,wallet:address,status:'pending',state:'pending',note,createdAt:serverTimestamp()});['dAmount','dNote','wAmount','wMethod','wAddr','wNote'].forEach(id=>$(id)&&($(id).value=''));updDAddr();toast('تم إرسال الطلب')}

async function getUserRef(t){if(t.uid){let r=doc(db,'users',t.uid),s=await getDoc(r);if(s.exists())return r}if(t.email){let q=await getDocs(query(collection(db,'users'),where('email','==',t.email)));if(!q.empty)return q.docs[0].ref}return null}
async function applyDelta(t,ns,na){let r=await getUserRef(t);if(!r)return;let s=await getDoc(r),u=s.data()||{},o=eff(t.type,t.status,+t.amount||0),n=eff(t.type,ns,+na||0),bal=uBal(u)+(n.bal-o.bal),dep=uDep(u)+(n.dep-o.dep);if(bal<0)throw Error('لا يمكن جعل الرصيد سالباً');await updateDoc(r,{balance:bal,deposit:Math.max(0,dep)})}
window.setStatus=async(k,st)=>{if(!isAdmin)return;let t=TXM[k];if(!t)return;try{await applyDelta(t,st,+t.amount||0);await updateDoc(t.ref,{status:st,state:st,approval:st,result:st,updatedAt:serverTimestamp()});toast('تم التحديث')}catch(e){toast(e.message||'خطأ')}}
window.editTx=async k=>{if(!isAdmin)return;let t=TXM[k];if(!t)return;let na=+prompt('المبلغ',t.amount||0),ns=str(prompt('الحالة: pending/success/rejected',t.status||'pending')||t.status),addr=prompt('العنوان',t.address||'')??t.address,note=prompt('ملاحظة',t.note||'')??t.note,method=prompt('الطريقة',t.method||'')??t.method;if(!(na>0)||!['pending','success','rejected'].includes(ns))return;try{await applyDelta(t,ns,na);await updateDoc(t.ref,{amount:na,value:na,status:ns,state:ns,approval:ns,result:ns,address:addr,wallet:addr,note,method,currency:method,updatedAt:serverTimestamp()});toast('تم التعديل')}catch(e){toast(e.message||'خطأ')}}
window.ban=async(uid,v)=>{if(!isAdmin)return;await updateDoc(doc(db,'users',uid),{banned:!!v});toast(v?'تم الحظر':'تم فك الحظر')}
window.editUser=async uid=>{if(!isAdmin)return;let r=doc(db,'users',uid),s=await getDoc(r);if(!s.exists())return;let u=s.data()||{},bal=+prompt('الرصيد',uBal(u)),dep=+prompt('إجمالي الإيداع المقبول',uDep(u)),role=str(prompt('role: admin/user',u.role||'user')||u.role);if(isNaN(bal)||isNaN(dep)||!['admin','user'].includes(role))return;await updateDoc(r,{balance:bal,deposit:dep,role});toast('تم الحفظ')}

window.saveAddr=async id=>{if(!isAdmin)return;let name=str($('name_'+id).value),icon=str($('ico_'+id).value)||'💳',address=str($('address_'+id).value);if(!name||!address)return toast('أكمل البيانات');await setDoc(doc(db,ADDRCOL,id),{name,icon,address,enabled:true,updatedAt:serverTimestamp()},{merge:true});toast('تم الحفظ')}
window.toggleAddr=async(id,v)=>{if(!isAdmin)return;await setDoc(doc(db,ADDRCOL,id),{enabled:!!v,updatedAt:serverTimestamp()},{merge:true});toast(v?'تم التفعيل':'تم التعطيل')}
window.delAddr=async id=>{if(!isAdmin)return;if(!confirm('حذف الشبكة؟'))return;await deleteDoc(doc(db,ADDRCOL,id));toast('تم الحذف')}
window.addAddr=async()=>{if(!isAdmin)return;let id='addr_'+Date.now();await setDoc(doc(db,ADDRCOL,id),{name:'شبكة جديدة',icon:'💳',address:'',enabled:true,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});toast('تمت الإضافة')}

onAuthStateChanged(auth,async u=>{offMe();offUs();offAd();stopTx();if(!u){ME=null;UD={};US=[];ADDR=[];isAdmin=0;show(0);return}ME=u;UD=await fixRole(u);isAdmin=UD.role=='admin'||u.email==AE;show(1);paint();offMe=onSnapshot(doc(db,'users',u.uid),s=>{UD=s.data()||{};paint();UD.banned&&signOut(auth)});startTx();startAddr();if(isAdmin)offUs=onSnapshot(collection(db,'users'),s=>{US=[];s.forEach(d=>US.push({id:d.id,...d.data()}));renderAdmin()})});
</script>
</body></html>
