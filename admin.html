function FLD(o,extra=[]){let z={...o};extra.forEach(k=>k in z||(z[k]=k=="disabled"?!!o.disabled:k=="status"?(o.status||"pending"):/balance|amount/i.test(k)?0:""));return Object.entries(z).filter(([k,v])=>k!="id"&&k!="_c"&&k!="path"&&(typeof v=="string"||typeof v=="number"||typeof v=="boolean"||v==null)).map(([k,v])=>{let n=typeof v=="number"||/balance|amount/i.test(k),b=typeof v=="boolean"||k=="disabled";return`<label class="fld"><span>${H(LBL(k))}</span>${b?`<select data-k="${H(k)}" data-t="b"><option value="false"${v?"":" selected"}>لا</option><option value="true"${v?" selected":""}>نعم</option></select>`:k=="status"?`<select data-k="status" data-t="s"><option${L(v)=="pending"?" selected":""}>pending</option><option${L(v)=="processing"?" selected":""}>processing</option><option${L(v)=="accepted"||L(v)=="approved"?" selected":""}>accepted</option><option${L(v)=="rejected"?" selected":""}>rejected</option></select>`:`<input ${n?'type="number" step="any"':'type="text"'} data-k="${H(k)}" data-t="${n?"n":"s"}" value="${H(v??"")}">`}</label>`}).join("")}
function PAY(){let p={};mb.querySelectorAll("[data-k]").forEach(i=>{let k=i.dataset.k,t=i.dataset.t,v=i.value;p[k]=t=="n"?(v==""?0:+v):t=="b"?v=="true":v.trim()});return p}
function openUser(id){let u=S.u.find(x=>x.id==id);if(!u)return;let o={...u};["name","username","email","balance","phone","role","disabled"].forEach(k=>k in o||(o[k]=k=="disabled"?!!u.disabled:k=="balance"?(u.balance??u.amount??0):""));mt.textContent="تعديل المستخدم";mb.innerHTML=`<div class="fm">${FLD(o)}</div><div class="acts ma"><button class="btn s" id="svu">حفظ</button><button class="btn d" id="tgu">${u.disabled?"تفعيل الحساب":"تعطيل الحساب"}</button></div>`;mod.classList.add("on");$("#svu").onclick=async()=>{try{await updateDoc(doc(db,"users",id),PAY());mod.classList.remove("on")}catch(e){alert(e.message||"تعذر الحفظ")}};$("#tgu").onclick=async()=>{try{await updateDoc(doc(db,"users",id),{disabled:!u.disabled});mod.classList.remove("on")}catch(e){alert(e.message||"تعذر التعديل")}}}
function openTx(c,id){let arr=c=="deposits"?S.d:S.w,t=arr.find(x=>x.id==id);if(!t)return;let o={...t};["status","amount","uid","userId","email","coin","address","note","txid"].forEach(k=>k in o||(o[k]=k=="status"?(t.status||"pending"):/amount/i.test(k)?(t.amount??0):""));mt.textContent="تعديل الطلب";mb.innerHTML=`<div class="fm">${FLD(o)}</div><div class="acts ma"><button class="btn s" id="svt">حفظ</button><button class="btn p" id="pnt">قيد المعالجة</button><button class="btn s" id="okt">قبول</button><button class="btn d" id="rjt">رفض</button></div>`;mod.classList.add("on");$("#svt").onclick=async()=>{try{await updateDoc(doc(db,c,id),PAY());mod.classList.remove("on")}catch(e){alert(e.message||"تعذر الحفظ")}};$("#pnt").onclick=async()=>{try{await updateDoc(doc(db,c,id),{status:"processing"});mod.classList.remove("on")}catch(e){alert(e.message||"تعذر التعديل")}};$("#okt").onclick=async()=>{try{await updateDoc(doc(db,c,id),{status:"accepted"});mod.classList.remove("on")}catch(e){alert(e.message||"تعذر التعديل")}};$("#rjt").onclick=async()=>{try{await updateDoc(doc(db,c,id),{status:"rejected"});mod.classList.remove("on")}catch(e){alert(e.message||"تعذر التعديل")}}}
$("#list").onclick=async e=>{let b=e.target.closest("[data-act]");if(!b)return;let act=b.dataset.act;if(act=="uedit")return openUser(b.dataset.id);if(act=="tedit")return openTx(b.dataset.c,b.dataset.id);if(act=="tok")try{await updateDoc(doc(db,b.dataset.c,b.dataset.id),{status:"accepted"})}catch(err){alert(err.message||"تعذر التعديل")}if(act=="tbad")try{await updateDoc(doc(db,b.dataset.c,b.dataset.id),{status:"rejected"})}catch(err){alert(err.message||"تعذر التعديل")}if(["aedit","asave","atog"].includes(act)){let c=b.closest(".ad"),inp=c.querySelector("input"),path=c.dataset.path,ref=doc(db,...path.split("/"));if(act=="aedit"){inp.disabled=false;inp.focus();inp.select()}if(act=="asave")try{await updateDoc(ref,{address:inp.value.trim()});inp.disabled=true}catch(err){alert(err.message||"تعذر الحفظ")}if(act=="atog"){let row=S.a.find(x=>x.path==path);try{await updateDoc(ref,{disabled:!row.disabled})}catch(err){alert(err.message||"تعذر التعديل")}}}};

const gate=$("#gate"),lock=$("#lock"),secret=$("#secret"),gm=$("#gm"),appWrap=$("#appWrap"),enter=$("#enter");

const cv=$("#fx"),cx=cv.getContext("2d"),D=window.devicePixelRatio||1;let W=innerWidth,H=innerHeight,stars=[],pts=[],bursts=[];
function rs(){W=innerWidth;H=innerHeight;cv.width=W*D;cv.height=H*D;cv.style.width=W+"px";cv.style.height=H+"px";cx.setTransform(D,0,0,D,0,0);stars=[...Array(130)].map(()=>({x:Math.random()*W,y:Math.random()*H,z:Math.random()*2+.3,r:Math.random()*1.8+.2,s:Math.random()*.3+.05}));pts=[...Array(42)].map(()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.7,vy:(Math.random()-.5)*.7,r:Math.random()*2+1}))}rs();addEventListener("resize",rs);
function boom(x,y){for(let i=0;i<34;i++){let a=Math.random()*Math.PI*2,v=Math.random()*4+1;bursts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,l:40+Math.random()*30,o:1,c:`hsla(${260+Math.random()*120},100%,70%,1)`})}}
setInterval(()=>{let p=pts[Math.random()*pts.length|0];p&&boom(p.x,p.y)},1500);
(function an(){requestAnimationFrame(an);cx.clearRect(0,0,W,H);for(let s of stars){s.y+=s.s*s.z;if(s.y>H){s.y=-2;s.x=Math.random()*W}cx.beginPath();cx.fillStyle=`rgba(255,255,255,${.25+s.z*.25})`;cx.arc(s.x,s.y,s.r*s.z,0,7);cx.fill()}for(let i=0;i<pts.length;i++){let p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;for(let j=i+1;j<pts.length;j++){let q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy);if(d<150){cx.strokeStyle=`rgba(170,120,255,${1-d/150})`;cx.lineWidth=.8;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.stroke()}}cx.beginPath();cx.fillStyle="#d9c0ff";cx.arc(p.x,p.y,p.r,0,7);cx.fill()}bursts=bursts.filter(b=>b.l>0);for(let b of bursts){b.x+=b.vx;b.y+=b.vy;b.vx*=.98;b.vy*=.98;b.l--;b.o=b.l/70;cx.beginPath();cx.fillStyle=b.c.replace(",1)",`,`+b.o+`)`);cx.arc(b.x,b.y,2.1,0,7);cx.fill()}})();
</script></body></html>
