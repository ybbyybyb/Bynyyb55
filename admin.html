<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>عناوين binolla</title><style>*{box-sizing:border-box;font-family:Tahoma,Arial,sans-serif}html,body{margin:0;background:#0a0613;color:#fff}body{direction:rtl}.x{display:none!important}.w{max-width:1180px;margin:auto;padding:18px}.b{cursor:pointer;color:#fff;background:linear-gradient(180deg,#7a38ff,#5f25db);border:1px solid #ae86ff;padding:10px 14px;border-radius:16px;font:inherit}.i{width:100%;padding:12px 14px;border-radius:16px;background:#120b1d;border:1px solid #7240ff55;color:#fff;font:inherit;outline:0}.auth{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#381864 0,#150b25 45%,#09050f 100%)}.box{width:min(420px,100%);background:linear-gradient(180deg,#19112a,#120b1d);border:1px solid #7b44ff66;border-radius:26px;padding:18px;box-shadow:0 15px 40px #0008}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}.brand{font-size:28px;font-weight:900}.tag{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:linear-gradient(180deg,#201332,#160e25);border:1px solid #7a43ff55;font-size:13px}.search{width:100%;padding:14px 18px;border-radius:20px;background:linear-gradient(180deg,#160f26,#110a1d);border:1px solid #7442ff55;color:#fff;margin-bottom:12px;font:inherit;outline:0}.addr{display:grid;gap:10px}.ar{background:linear-gradient(180deg,#160f24,#110a1d);border:1px solid #7240ff44;border-radius:20px;padding:14px;display:grid;gap:10px}.ah{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.an{display:flex;align-items:center;gap:10px}.ai{width:44px;height:44px;border-radius:12px;background:#221337;border:1px solid #7b44ff44;display:grid;place-items:center;font-size:22px}.nm{font-weight:900;font-size:16px}.nt{color:#bbaee6;font-size:12px}.av{font-family:monospace;background:#0d0817;border:1px dashed #7b44ff44;border-radius:12px;padding:10px;word-break:break-all;font-size:13px;color:#d8ccff}.st{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid #ffffff1a}.on{background:#10281b;color:#87efb7;border-color:#3add9166}.off{background:#33111a;color:#ff9eb3;border-color:#ff5f8666}.empty{min-height:120px;border:1px dashed #8850ff77;border-radius:24px;display:grid;place-items:center;color:#d8ccff;background:#120b20}.cp{cursor:pointer;user-select:all}.mut{color:#bbaee6;font-size:13px}</style></head><body>
<section id="auth" class="auth"><div class="box"><div class="brand">عناوين binolla</div><div class="mut" style="margin:8px 0 14px">دخول الأدمن لعرض العناوين</div><div style="display:grid;gap:10px"><input id="email" class="i" placeholder="البريد الإلكتروني" value="12345a@gmail.com"><input id="pass" class="i" type="password" placeholder="كلمة المرور" value="123456"><button class="b" onclick="go()">دخول وعرض العناوين</button></div></div></section>
<main id="app" class="x"><div class="w"><div class="top"><div class="brand">عناوين binolla</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="tag" id="who"></span><span class="tag" id="cnt">0</span><button class="b" style="background:linear-gradient(180deg,#371321,#250c15);border-color:#ff4d6d66" onclick="out()">خروج</button></div></div><input id="q" class="search" placeholder="بحث (اسم/شبكة/عنوان)" oninput="render()"><div id="list" class="addr"></div></div></main>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import{getFirestore,collection,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const cfg={apiKey:'AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg',authDomain:'hhhxh-5ebe4.firebaseapp.com',projectId:'hhhxh-5ebe4',storageBucket:'hhhxh-5ebe4.firebasestorage.app',messagingSenderId:'79243000696',appId:'1:79243000696:web:ee0fb2d2ccce791954e68d',measurementId:'G-08BR6LN6PT'},ADDRCOL='binolla',app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),$=e=>document.getElementById(e);
let ADDR=[],off=()=>{};
const str=v=>(v??'').toString().trim(),esc=s=>str(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),ts=v=>!v?0:typeof v=='number'?(v<1e12?v*1e3:v):v.toDate?+v.toDate():v.seconds?v.seconds*1e3:0;
const icoOf=a=>{let s=str(a.icon);if(s)return s;let n=str(a.id||a.name).toUpperCase();return/TRC/.test(n)?'💠':/BEP/.test(n)?'🟡':/ERC/.test(n)?'🔷':/USDC/.test(n)?'🔵':'💳'},nameOf=a=>str(a.name)||str(a.coin)||str(a.network)||str(a.id),netOf=a=>str(a.network)||str(a.coin)||str(a.id);
window.go=async()=>{try{await signInWithEmailAndPassword(auth,str($('email').value),str($('pass').value))}catch(e){alert(e.message)}};
window.out=()=>signOut(auth);

window.render=()=>{let q=str($('q').value).toLowerCase(),a=ADDR.filter(x=>!q||JSON.stringify(x).toLowerCase().includes(q));$('cnt').textContent=a.length+' عنوان';$('list').innerHTML=a.length?a.map(x=>{let nm=esc(nameOf(x)),nt=esc(netOf(x)),ic=esc(icoOf(x)),ad=esc(str(x.address)),en=x.enabled===false;return`<div class="ar"><div class="ah"><div class="an"><div class="ai">${ic}</div><div><div class="nm">${nm}</div><div class="nt">${nt} • ID: ${esc(x.id)}${en?' • معطل':''}</div></div></div><span class="st ${en?'off':'on'}">${en?'معطل':'مفعّل'}</span></div><div class="av cp" onclick="cp('${ad}')" title="اضغط للنسخ">${ad||'— لا يوجد عنوان —'}</div></div>`}).join(''):'<div class="empty">لا توجد عناوين</div>'};
onAuthStateChanged(auth,u=>{off();if(!u){$('auth').classList.remove('x');$('app').classList.add('x');ADDR=[];return}$('auth').classList.add('x');$('app').classList.remove('x');$('who').textContent=u.email;off=onSnapshot(collection(db,ADDRCOL),s=>{ADDR=[];s.forEach(d=>ADDR.push({id:d.id,...d.data()}));ADDR.sort((a,b)=>ts(b.updatedAt||b.createdAt)-ts(a.updatedAt||a.createdAt));render()},e=>alert('خطأ: '+e.message))});
</script></body></html>
