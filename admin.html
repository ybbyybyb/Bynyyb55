<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة binolla</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,Segoe UI,Tahoma,Arial;background:#0b1220;color:#e5e7eb}a{text-decoration:none}main{max-width:1200px;margin:auto;padding:14px}h1{font-size:22px;font-weight:800}.top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:14px}.badge{background:#13203a;border:1px solid #223252;color:#93c5fd;padding:6px 10px;border-radius:999px;font-size:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:12px 0}.card{background:#111a2e;border:1px solid #223252;border-radius:16px;padding:14px;box-shadow:0 6px 20px #0003}.card b{display:block;font-size:12px;color:#9ca3af;margin-bottom:8px}.card span{font-size:24px;font-weight:800;color:#fff}.bar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.inp,select{background:#111a2e;border:1px solid #223252;color:#fff;border-radius:12px;padding:11px 12px;min-width:180px;outline:0}.inp{flex:1}.tbl{overflow:auto;background:#111a2e;border:1px solid #223252;border-radius:16px}.tbl table{width:100%;border-collapse:collapse;min-width:880px}.tbl th,.tbl td{padding:12px 10px;border-bottom:1px solid #1c2943;text-align:right;font-size:13px}.tbl th{position:sticky;top:0;background:#0f1729;color:#93c5fd}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;direction:ltr;text-align:left}.tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#172554;color:#bfdbfe;font-size:12px}.ok{color:#22c55e}.err{color:#f87171}.mut{color:#9ca3af;font-size:12px}.coins{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin:12px 0}.coin{background:#111a2e;border:1px solid #223252;border-radius:14px;padding:12px}.coin h3{font-size:14px;margin-bottom:8px;color:#fff}.coin div{display:flex;justify-content:space-between;font-size:12px;color:#cbd5e1;margin:5px 0}button{cursor:pointer;background:#2563eb;border:0;color:#fff;padding:11px 14px;border-radius:12px;font-weight:700}.btns{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:640px){h1{font-size:18px}}</style></head><body><main><div class="top"><div><h1>لوحة تحكم binolla</h1><div class="mut">عرض مباشر من Firebase Firestore مع تحديث تلقائي</div></div><div class="btns"><span id="st" class="badge">جاري الاتصال...</span><button onclick="load()">تحديث يدوي</button></div></div><div class="grid"><div class="card"><b>إجمالي العناوين</b><span id="total">0</span></div><div class="card"><b>عدد العملات</b><span id="coinsCount">0</span></div><div class="card"><b>عدد الشبكات</b><span id="netsCount">0</span></div><div class="card"><b>آخر تحديث</b><span id="last" style="font-size:15px">-</span></div></div><div class="bar"><input id="q" class="inp" placeholder="بحث: عنوان / عملة / شبكة / ID"><select id="coinF"><option value="">كل العملات</option></select><select id="netF"><option value="">كل الشبكات</option></select></div><div id="coins" class="coins"></div><div class="tbl"><table><thead><tr><th>#</th><th>Document ID</th><th>العنوان</th><th>العملة</th><th>الشبكة</th><th>تاريخ الإنشاء</th></tr></thead><tbody id="tb"><tr><td colspan="6" class="mut">لا توجد بيانات بعد</td></tr></tbody></table></div></main><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";import{getFirestore,collectionGroup,onSnapshot,getDocs}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const app=initializeApp(firebaseConfig),db=getFirestore(app),$=s=>document.querySelector(s),fmt=d=>{try{if(!d)return"-";if(typeof d=="string")return d;let x=d.toDate?d.toDate():new Date(d);return isNaN(x)?"-":x.toLocaleString("ar-EG")}catch{return"-"}},ts=d=>{try{if(!d)return 0;if(typeof d=="string")return new Date(d).getTime()||0;return d.toDate?d.toDate().getTime():new Date(d).getTime()||0}catch{return 0}};let rows=[],off=()=>{};function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}function setStatus(t,c){$("#st").textContent=t;$("#st").className="badge "+(c||"")}function uniq(a){return[...new Set(a.filter(Boolean))]}function fillSelect(id,arr,val){const el=$(id);el.innerHTML='<option value="">'+(id=="#coinF"?"كل العملات":"كل الشبكات")+"</option>"+arr.map(x=>`<option ${x==val?"selected":""}>${esc(x)}</option>`).join("")}function render(){let q=$("#q").value.trim().toLowerCase(),cf=$("#coinF").value,nf=$("#netF").value,data=rows.filter(r=>(!cf||r.coin==cf)&&(!nf||r.network==nf)&&(!q||[r.id,r.address,r.coin,r.network].join(" ").toLowerCase().includes(q))).sort((a,b)=>ts(b.createdAt)-ts(a.createdAt));$("#total").textContent=rows.length;$("#coinsCount").textContent=uniq(rows.map(r=>r.coin)).length;$("#netsCount").textContent=uniq(rows.map(r=>r.network)).length;$("#last").textContent=new Date().toLocaleTimeString("ar-EG");fillSelect("#coinF",uniq(rows.map(r=>r.coin)).sort(),cf);fillSelect("#netF",uniq(rows.map(r=>r.network)).sort(),nf);let byCoin={};rows.forEach(r=>{byCoin[r.coin]??={count:0,nets:new Set};byCoin[r.coin].count++;if(r.network)byCoin[r.coin].nets.add(r.network)});$("#coins").innerHTML=Object.keys(byCoin).sort().map(k=>`<div class="coin"><h3>${esc(k||"-")}</h3><div><span>العناوين</span><b>${byCoin[k].count}</b></div><div><span>الشبكات</span><b>${byCoin[k].nets.size}</b></div></div>`).join("")||'<div class="mut">لا توجد عملات</div>';$("#tb").innerHTML=data.length?data.map((r,i)=>`<tr><td>${i+1}</td><td class="mono">${esc(r.id)}</td><td class="mono">${esc(r.address)}</td><td><span class="tag">${esc(r.coin||"-")}</span></td><td>${esc(r.network||"-")}</td><td>${esc(fmt(r.createdAt))}</td></tr>`).join(""):`<tr><td colspan="6" class="mut">لا توجد نتائج</td></tr>`}window.load=async()=>{setStatus("جاري التحديث...");try{const s=await getDocs(collectionGroup(db,"addresses"));rows=s.docs.map(d=>({id:d.id,...d.data()}));render();setStatus("متصل مباشر","ok")}catch(e){console.error(e);setStatus("خطأ في القراءة","err")}};["#q","#coinF","#netF"].forEach(id=>$(id).addEventListener("input",render));try{setStatus("جاري الاستماع المباشر...");off=onSnapshot(collectionGroup(db,"addresses"),s=>{rows=s.docs.map(d=>({id:d.id,...d.data()}));render();setStatus("متصل مباشر","ok")},e=>{console.error(e);setStatus("فشل الاتصال","err")})}catch(e){console.error(e);setStatus("خطأ","err")}window.addEventListener("beforeunload",()=>off&&off())</script></body></html>
