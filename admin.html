<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>لوحة التحكم</title><style>*{box-sizing:border-box;margin:0;padding:0;font-family:Tahoma,Arial,sans-serif}body{background:#12081f;color:#fff;min-height:100vh}body:before{content:"";position:fixed;inset:0;background:radial-gradient(900px 320px at 50% -10%,#4a1d72 0,#220d37 38%,#12081f 70%,#0c0514 100%);z-index:-2}body:after{content:"";position:fixed;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.18));z-index:-1}.x{max-width:980px;margin:auto;padding:10px 10px 90px}.h{display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px}.b{padding:7px 12px;border:1px solid #4a2d6d;background:#1d102f;border-radius:12px;color:#eee;font-size:12px}.t{text-align:center;font-size:28px;font-weight:800}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:6px}.tabs button,.btn,.a button,.uact button,.sbtn{border:1px solid #553579;background:#1a0f2a;color:#fff;border-radius:12px;cursor:pointer}.tabs button{white-space:nowrap;padding:10px 12px;position:relative;font-weight:700}.tabs b{background:#d82942;color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;margin-inline-start:6px}.tabs .on{background:linear-gradient(180deg,#6d31c4,#4b1c87);box-shadow:0 0 0 1px #8f61ff inset}.g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.s{background:#170d26;border:1px solid #42235e;border-radius:16px;min-height:78px;padding:14px}.s b{display:block;font-size:34px}.s span{font-size:13px;color:#d9caee}.q{width:100%;height:46px;background:#170d26;border:1px solid #42235e;border-radius:14px;color:#fff;padding:0 14px;margin:4px 0 10px;outline:0}.list{display:grid;gap:12px}.c,.uc{background:#170d26;border:1px solid #42235e;border-radius:18px;padding:10px;box-shadow:0 10px 26px rgba(0,0,0,.25)}.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}.p{display:flex;gap:6px;flex-wrap:wrap}.p i,.st{font-style:normal;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}.dep{background:#15345c;color:#9fd0ff}.wd{background:#57361b;color:#ffd099}.pen{background:#5a4b13;color:#ffe58a}.ok{background:#144f2b;color:#9bf0a8}.rej{background:#5e1721;color:#ffadbb}.amt{text-align:left}.amt b{display:block;font-size:32px}.amt span{font-size:13px;color:#d2c7e7}.f{background:#140a22;border:1px solid #3a2059;border-radius:12px;padding:9px 12px;margin:7px 0;display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center}.f label{font-size:12px;color:#bca8dd}.f div{font-size:13px;word-break:break-all}.a{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.a button,.uact button,.sbtn{padding:12px 10px;font-weight:700}.a .y{background:#6a5011}.a .copy{background:#25143a}.a .r{background:#641a24}.a .g{background:#125329}.uc h3{font-size:14px;margin-bottom:8px}.ud{display:grid;grid-template-columns:1fr 1fr;gap:8px}.ud .f{margin:0}.uact{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.uact .p1{background:#125329}.uact .p2{background:#5b3814}.uact .p3{background:#641a24}.uact .p4{background:#3d205e}.uact .p5{background:#3a3052}.uact .p6{background:#255063}.hide{display:none}.ov{position:fixed;inset:0;background:rgba(7,2,14,.86);display:grid;place-items:center;z-index:9}.box{width:min(92vw,360px);background:#170d26;border:1px solid #53327d;border-radius:22px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.45)}.box h2{text-align:center;margin-bottom:14px}.box input{width:100%;height:48px;background:#12081f;border:1px solid #42235e;border-radius:14px;color:#fff;padding:0 14px;margin:10px 0}.box button{width:100%;height:48px;background:linear-gradient(180deg,#6d31c4,#4b1c87);border:0;border-radius:14px;color:#fff;font-weight:800;cursor:pointer}.n{text-align:center;color:#bfaee0;font-size:12px;margin-top:8px}.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#24113b;border:1px solid #6d31c4;padding:10px 16px;border-radius:12px;display:none;z-index:10}.empty{padding:30px 14px;text-align:center;color:#bfaee0;background:#170d26;border:1px dashed #4c2d72;border-radius:16px}@media(min-width:760px){.g{grid-template-columns:repeat(3,1fr)}.a{grid-template-columns:repeat(4,1fr)}.uact{grid-template-columns:repeat(6,1fr)}}::-webkit-scrollbar{width:0}</style></head><body><div id="login" class="ov"><div class="box"><h2>دخول لوحة التحكم</h2><input id="pass" type="password" placeholder="الكود السري"><button id="go">دخول</button><div class="n">الكود مضبوط على 224</div></div></div><div class="x" id="app"><div class="h"><button class="b" id="live">مباشر</button><div class="t">لوحة تحكم الإيداعات والسحوبات</div><div style="width:56px"></div></div><div class="tabs" id="tabs"></div><div class="g"><div class="s"><b id="nAll">0</b><span>كل الطلبات</span></div><div class="s"><b id="nDep">0</b><span>الإيداعات</span></div><div class="s"><b id="nWd">0</b><span>السحوبات</span></div><div class="s"><b id="nPen">0</b><span>قيد المعالجة</span></div><div class="s"><b id="nOk">0</b><span>مقبول</span></div><div class="s"><b id="nRej">0</b><span>مرفوض</span></div></div><input id="q" class="q" placeholder="بحث سريع"><div id="txs" class="list"></div><div id="users" class="list hide"></div></div><div id="toast" class="toast"></div><script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import{getFirestore,collection,doc,onSnapshot,updateDoc,runTransaction,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"},
db=getFirestore(initializeApp(cfg)),
$=e=>document.getElementById(e),
X=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])),
N=v=>{if(v==null||v==="")return 0;if(typeof v=="number")return isFinite(v)?v:0;v=String(v).replace(/[^\d.-]/g,"");v=parseFloat(v);return isFinite(v)?v:0},
B=v=>v===!0||v===1||v==="1"||String(v).toLowerCase()==="true",
G=(o,a,d="")=>{for(let k of a)if(o&&o[k]!=null&&o[k]!=="")return o[k];return d},
GN=(o,a,d=0)=>{for(let k of a)if(o&&o[k]!=null&&o[k]!=="")return N(o[k]);return d},
GB=(o,a,d=!1)=>{for(let k of a)if(o&&o[k]!=null&&o[k]!=="")return B(o[k]);return d},
TS=v=>{if(!v)return 0;if(v?.toDate)return+v.toDate();if(v?.seconds)return 1e3*v.seconds;if(typeof v=="number")return v>1e12?v:1e3*v;let t=Date.parse(v);return isNaN(t)?0:t},
GD=(o,a)=>{for(let k of a)if(o&&o[k]!=null&&o[k]!=="")return TS(o[k]);return 0},
F=n=>N(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}),
D=t=>{if(!t)return"-";let d=new Date(t),p=n=>String(n).padStart(2,"0");return`${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`},
T=m=>{let t=$("toast");t.textContent=m;t.style.display="block";clearTimeout(T.i);T.i=setTimeout(()=>t.style.display="none",2200)},
tabs=[["all","الكل"],["withdraw","السحب"],["deposit","الإيداع"],["kyc","التوثيق"],["users","المستخدمين"],["blocked","محظورين"]],
S={tab:"all",tx:[],tm:{},us:[]},
ST=s=>{s=String(s||"").toLowerCase();return/^(success|approved|accept|accepted|done|complete|completed|paid|ok)$/i.test(s)||/success|approved|accept|accepted|done|complete|completed|paid|ok/.test(s)?"success":/reject|failed|cancel|denied|declined|refused/.test(s)?"rejected":"pending"},
TY=(v,c)=>{v=String(v||"").toLowerCase();return/with|withdraw|cash/.test(v)||c==="withdrawals"?"withdraw":/dep|top|recharge|charge|pay/.test(v)||c==="deposits"?"deposit":v==="withdraw"||v==="deposit"?v:"deposit"},
NET=t=>G(t,["method","network","chain","blockchain"],/trc20/i.test(G(t,["coin","currency","asset"],""))?"TRC20":/bep20/i.test(G(t,["coin","currency","asset"],""))?"BEP20":/polygon/i.test(G(t,["coin","currency","asset"],""))?"POLYGON":"-"),
mapUser=(r,p)=>{let m={updatedAt:serverTimestamp(),...p},w=r?._raw||{};[["balance",["walletBalance","usdtBalance","funds","credit"]],["deposit",["totalDeposit","rechargeTotal","charged","totalRecharge"]],["plan",["package","membership"]],["vip",["vipLevel","tier"]],["planActive",["subscriptionActive","isPlanActive"]],["banned",["blocked","isBlocked","ban"]],["kyc",["verified","isVerified"]],["kycStatus",["verifyStatus","verificationStatus"]],["planPrice",["packagePrice","membershipPrice"]]].forEach(([k,a])=>k in p&&a.forEach(x=>x in w&&(m[x]=p[k])));return m},
mapTx=(r,s)=>{let m={status:s,reviewedAt:serverTimestamp()},w=r?._raw||{};["requestStatus","state","reviewStatus"].forEach(x=>x in w&&(m[x]=s));return m},
normTx=(d,c)=>{let r=d.data(),type=TY(G(r,["type","txType","kind","requestType","operation"],c),c),status=ST(G(r,["status","requestStatus","state","reviewStatus"],"pending"));return{id:d.id,col:c,_raw:r,type,status,amount:GN(r,["amount","value","usdt","total","sum","netAmount"]),uid:String(G(r,["uid","userId","user_id","accountId","memberId","user","ownerId"],"")),email:String(G(r,["email","userEmail","mail"],"")),address:String(G(r,["address","wallet","walletAddress","usdtAddress","toAddress","withdrawAddress","depositAddress"],"")),coin:String(G(r,["coin","currency","asset","symbol"],"USDT")),method:String(G(r,["method","network","chain","blockchain"],"")),time:GD(r,["createdAt","created_at","date","time","timestamp","submittedAt","requestDate","updatedAt"])}},
normUser=d=>{let r=d.data();return{id:d.id,uid:d.id,_raw:r,email:String(G(r,["email","userEmail","mail"],"")),balance:GN(r,["balance","walletBalance","usdtBalance","funds","credit"]),deposit:GN(r,["deposit","totalDeposit","rechargeTotal","charged","totalRecharge"]),plan:String(G(r,["plan","package","membership"],"")),vip:String(G(r,["vip","vipLevel","tier"],"")),banned:GB(r,["banned","blocked","isBlocked","ban"]),kyc:GB(r,["kyc","verified","isVerified"]),kycStatus:String(G(r,["kycStatus","verifyStatus","verificationStatus"],"")),planActive:GB(r,["planActive","subscriptionActive","isPlanActive"])||!!G(r,["plan","package","membership","vip","vipLevel","tier"],""),time:GD(r,["createdAt","created_at","date","time","timestamp","updatedAt"])}},
rebuild=()=>{S.tx=Object.values(S.tm).flat().sort((a,b)=>b.time-a.time);render()},
cnt=k=>k==="all"?S.tx.length:k==="withdraw"?S.tx.filter(x=>x.type==="withdraw").length:k==="deposit"?S.tx.filter(x=>x.type==="deposit").length:k==="users"?S.us.length:k==="blocked"?S.us.filter(x=>x.banned).length:k==="kyc"?S.us.filter(x=>x.kyc||x.kycStatus==="pending"||x.kycStatus==="verified").length:0,
stat=()=>{nAll.textContent=cnt("all");nDep.textContent=cnt("deposit");nWd.textContent=cnt("withdraw");nPen.textContent=S.tx.filter(x=>x.status==="pending").length;nOk.textContent=S.tx.filter(x=>x.status==="success").length;nRej.textContent=S.tx.filter(x=>x.status==="rejected").length;tabsBox();live.textContent=`مباشر ${S.tx.length}/${S.us.length}`},
tabsBox=()=>{$("tabs").innerHTML=tabs.map(([k,n])=>`<button class='${S.tab===k?"on":""}' data-k='${k}'>${n}<b>${cnt(k)}</b></button>`).join("");[...$("tabs").children].forEach(b=>b.onclick=()=>{S.tab=b.dataset.k;render()})},
flt=()=>($("q").value||"").trim().toLowerCase(),
txf=a=>{let q=flt();return a.filter(x=>!q||[x.id,x.uid,x.email,x.address,x.coin,x.method,x.status,x.type,x.amount,x.col].join(" ").toLowerCase().includes(q)).filter(x=>S.tab==="all"||x.type===S.tab)},
usf=a=>{let q=flt();return a.filter(x=>!q||[x.id,x.email,x.uid,x.plan,x.vip,x.balance,x.deposit].join(" ").toLowerCase().includes(q)).filter(x=>S.tab==="users"||(S.tab==="blocked"?x.banned:S.tab==="kyc"?(x.kyc||x.kycStatus==="pending"||x.kycStatus==="verified"):1))},
render=()=>{stat();let su=S.tab==="users"||S.tab==="blocked"||S.tab==="kyc";$("users").classList.toggle("hide",!su);$("txs").classList.toggle("hide",su);if(su){let a=usf(S.us);$("users").innerHTML=a.length?a.map(u=>`<div class='uc'><h3>${X(u.email||"بدون بريد")} ${u.banned?'<span class="st rej">محظور</span>':""} ${u.kyc||u.kycStatus==="verified"?'<span class="st ok">موثق</span>':""} ${u.planActive?'<span class="st dep">'+X(u.plan||u.vip||"VIP")+"</span>":""}</h3><div class='ud'><div class='f'><label>المستخدم</label><div>${X(u.id)}</div></div><div class='f'><label>الرصيد</label><div>${F(u.balance)} USDT</div></div><div class='f'><label>إجمالي الشحن</label><div>${F(u.deposit)} USDT</div></div><div class='f'><label>الخطة</label><div>${X(u.plan||u.vip||"-")}</div></div></div><div class='uact'><button class='p1' onclick="adj('${u.id}','bal+')">رصيد+</button><button class='p3' onclick="adj('${u.id}','bal-')">رصيد-</button><button class='p2' onclick="adj('${u.id}','dep+')">إعادة شحن</button><button class='p4' onclick="adj('${u.id}','plan')">تفعيل خطة</button><button class='p6' onclick="adj('${u.id}','kyc')">توثيق</button><button class='p5' onclick="adj('${u.id}','ban')">${u.banned?"فك حظر":"حظر"}</button></div></div>`).join(""):`<div class='empty'>لا توجد حسابات مطابقة</div>`}else{let a=txf(S.tx);$("txs").innerHTML=a.length?a.map(t=>{let sc=t.status==="success"?"ok":t.status==="rejected"?"rej":"pen",sn=t.status==="success"?"مقبول":t.status==="rejected"?"مرفوض":"قيد المعالجة",tc=t.type==="deposit"?"dep":"wd",tn=t.type==="deposit"?"إيداع":"سحب";return`<div class='c'><div class='ct'><div class='p'><i class='st ${sc}'>${sn}</i><i class='st ${tc}'>${tn}</i></div><div class='amt'><b>$${F(t.amount)}</b><span>Tether (USDT/${X(NET(t))})</span></div></div><div class='f'><label>رقم الطلب</label><div>${X(t.id)}</div></div><div class='f'><label>التاريخ</label><div>${D(t.time)}</div></div><div class='f'><label>الإيميل</label><div>${X(t.email||"-")}</div></div><div class='f'><label>المستخدم</label><div>${X(t.uid||"-")}</div></div><div class='f'><label>العملة</label><div>${X(t.coin||"USDT")}</div></div><div class='f'><label>الشبكة</label><div>${X(NET(t))}</div></div><div class='f'><label>العنوان</label><div>${X(t.address||"-")}</div></div><div class='f'><label>الحالة الحالية</label><div>${sn}</div></div><div class='a'><button class='y' onclick="setTx('${t.id}','${t.col}','pending')">معلق</button><button class='copy' onclick="cpy('${(t.address||t.id).replace(/'/g,"")}')">نسخ</button><button class='r' onclick="setTx('${t.id}','${t.col}','rejected')">رفض</button><button class='g' onclick="setTx('${t.id}','${t.col}','success')">قبول</button></div></div>`}).join(""):`<div class='empty'>لا توجد طلبات مطابقة</div>`}};

// ✅ تسجيل الدخول - الكود 224 يمنح صلاحية أدمن كاملة
const ADMIN_KEY="admin224",PASS="224";
if(localStorage.getItem(ADMIN_KEY)==="1")$("login").style.display="none";
$("go").onclick=()=>{if($("pass").value===PASS){localStorage.setItem(ADMIN_KEY,"1");$("login").style.display="none";T("✅ مرحباً بك في لوحة التحكم")}else T("❌ الكود غير صحيح")};
$("pass").addEventListener("keydown",e=>e.key==="Enter"&&$("go").click());
$("q").oninput=render;

window.cpy=async v=>{try{await navigator.clipboard.writeText(v);T("✅ تم النسخ")}catch{T("تعذر النسخ")}};
window.adj=async(id,k)=>{let u=S.us.find(x=>x.id===id);if(!u)return T("المستخدم غير موجود");let r=doc(db,"users",id),v,p;if(k==="bal+"||k==="bal-"||k==="dep+"){v=parseFloat(prompt(k==="dep+"?"قيمة إعادة الشحن":"القيمة","0")||0);if(!(v>0))return;let b=N(u.balance),d=N(u.deposit);if(k==="bal+")p=mapUser(u,{balance:b+v});if(k==="bal-")p=mapUser(u,{balance:Math.max(0,b-v)});if(k==="dep+")p={...mapUser(u,{balance:b+v,deposit:d+v}),lastRecharge:v};await updateDoc(r,p);T("✅ تم التعديل")}else if(k==="plan"){let s=prompt("اسم الخطة|السعر|VIP","VIP1|100|VIP1");if(!s)return;let[a,b,c]=s.split("|");await updateDoc(r,mapUser(u,{plan:a||"VIP1",planPrice:N(b),vip:c||a||"VIP1",planActive:1,planAt:serverTimestamp()}));T("✅ تم تفعيل الخطة")}else if(k==="ban"){await updateDoc(r,mapUser(u,{banned:!u.banned}));T(u.banned?"✅ تم فك الحظر":"✅ تم الحظر")}else if(k==="kyc"){let n=!(u.kyc||u.kycStatus==="verified");await updateDoc(r,mapUser(u,{kyc:n,kycStatus:n?"verified":"none"}));T(n?"✅ تم التوثيق":"✅ تم إلغاء التوثيق")}};
window.setTx=async(id,col,to)=>{let t=S.tx.find(x=>x.id===id&&x.col===col);if(!t)return T("الطلب غير موجود");let tr=doc(db,col,id);try{await runTransaction(db,async x=>{let ts=await x.get(tr);if(!ts.exists())throw 0;let tt=normTx(ts,col),uid=tt.uid||(S.us.find(u=>(u.email||"").toLowerCase()===(tt.email||"").toLowerCase())||{}).id||"",uRef=uid?doc(db,"users",uid):0,uu={_raw:{}},b=0,d=0;if(uRef){let us=await x.get(uRef);uu=us.exists()?normUser(us):{id:uid,_raw:{},email:tt.email||"",balance:0,deposit:0};b=N(uu.balance);d=N(uu.deposit);if(tt.status==="success")tt.type==="deposit"?(b=Math.max(0,b-tt.amount),d=Math.max(0,d-tt.amount)):b+=tt.amount;if(to==="success")tt.type==="deposit"?(b+=tt.amount,d+=tt.amount):b=Math.max(0,b-tt.amount);x.set(uRef,{email:uu.email||tt.email||"",...mapUser(uu,{balance:b,deposit:d})},{merge:1})}x.set(tr,mapTx(tt,to),{merge:1})});T("✅ تم تحديث الطلب")}catch{T("❌ فشل تحديث الطلب")}};

["transactions","deposits","withdrawals"].forEach(c=>onSnapshot(collection(db,c),s=>{S.tm[c]=[];s.forEach(d=>S.tm[c].push(normTx(d,c)));rebuild()},()=>{S.tm[c]=S.tm[c]||[];rebuild()}));
onSnapshot(collection(db,"users"),s=>{S.us=[];s.forEach(d=>S.us.push(normUser(d)));S.us.sort((a,b)=>b.time-a.time);render()});
render();
</script></body></html>
