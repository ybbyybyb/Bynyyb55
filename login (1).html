<!doctype html><html lang=ar dir=rtl><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name=theme-color content=#070612><title>BETIXO.COM | Login</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:#070612;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif;min-height:100vh}button,input{font:inherit;border:0;outline:0}.wrap{max-width:460px;margin:0 auto;padding:24px 16px 60px;min-height:100vh}.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin:18px 0 22px}.brand img{width:54px;height:54px;border-radius:14px;box-shadow:0 0 18px #4f46e599}.brand b{font-size:26px;letter-spacing:.5px}.tabs{display:flex;background:#111125;border:1px solid #232334;border-radius:14px;padding:5px;margin-bottom:18px}.tabs button{flex:1;background:transparent;color:#aaa;padding:11px 0;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer}.tabs button.on{background:linear-gradient(135deg,#6d28d9,#2563eb);color:#fff;box-shadow:0 6px 18px #2563eb44}.card{background:#0d0c19;border:2px solid #232334;border-radius:18px;padding:18px}.field{margin-bottom:13px}.field label{display:block;font-size:13px;margin-bottom:6px;color:#bbb}.field .ip{display:flex;align-items:center;background:#0a0a14;border:2px solid #232334;border-radius:12px;padding:0 12px;transition:.2s}.field .ip:focus-within{border-color:#5b3df5;box-shadow:0 0 0 3px #5b3df533}.field input{flex:1;background:transparent;color:#fff;padding:13px 6px;width:100%}.field .eye{cursor:pointer;color:#888;padding:6px;font-size:18px}.field .opt{font-size:11px;color:#7a86ff;margin-right:6px}.btn{width:100%;background:linear-gradient(135deg,#6d28d9,#2563eb);color:#fff;font-weight:800;padding:14px;border-radius:13px;cursor:pointer;font-size:16px;margin-top:6px;box-shadow:0 8px 22px #2563eb55}.btn:disabled{opacity:.65;cursor:not-allowed}.msg{margin-top:10px;font-size:13px;text-align:center;min-height:18px}.msg.err{color:#ff6b6b}.msg.ok{color:#22f1b0}.lnk{text-align:center;margin-top:14px;font-size:14px;color:#bbb}.lnk a{color:#7a86ff;cursor:pointer;font-weight:700}.refbox{background:linear-gradient(135deg,#171327,#241548);border:1.5px solid #5b3df5;border-radius:14px;padding:13px;margin-bottom:14px;display:none;align-items:center;gap:12px}.refbox.on{display:flex}.refbox img{width:46px;height:46px;border-radius:12px;background:#0a0a14}.refbox .ri{flex:1;min-width:0}.refbox b{display:block;font-size:14px;color:#ffd76a}.refbox span{display:block;font-size:12px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.refbox .rb{font-size:13px;color:#22f1b0;margin-top:3px}.ld{position:fixed;inset:0;background:#070612cc;display:none;align-items:center;justify-content:center;z-index:99}.ld.on{display:flex}.spin{width:42px;height:42px;border:4px solid #ffffff22;border-top-color:#5b3df5;border-radius:50%;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}</style></head><body><div class=wrap><div class=brand><img src="https://i.ibb.co/HDHkmSW8/48.png" alt=B><b>BETIXO.COM</b></div><div class=tabs><button id=tbLogin class=on>تسجيل الدخول</button><button id=tbReg>إنشاء حساب</button></div><div class=card><div id=refBox class=refbox><img id=refAvatar src="https://cdn-icons-png.flaticon.com/128/8004/8004218.png"><div class=ri><b id=refName>مستخدم</b><span id=refId>ID</span><div class=rb id=refMeta></div></div></div><div id=fLogin><div class=field><label>البريد الإلكتروني</label><div class=ip><input id=lEmail type=email placeholder="email@example.com" autocomplete=email></div></div><div class=field><label>كلمة المرور</label><div class=ip><input id=lPass type=password placeholder="••••••••" autocomplete=current-password><span class=eye id=lEye>👁</span></div></div><button class=btn id=btnLogin>دخول</button></div><div id=fReg style=display:none><div class=field><label>الاسم</label><div class=ip><input id=rName placeholder="اسمك"></div></div><div class=field><label>البريد الإلكتروني</label><div class=ip><input id=rEmail type=email placeholder="email@example.com" autocomplete=email></div></div><div class=field><label>كلمة المرور</label><div class=ip><input id=rPass type=password placeholder="٦ أحرف على الأقل" autocomplete=new-password><span class=eye id=rEye>👁</span></div></div><div class=field><label>كود الدعوة <span class=opt>(اختياري)</span></label><div class=ip><input id=rRef placeholder="كود دعوة (اختياري)"></div></div><button class=btn id=btnReg>إنشاء الحساب</button></div><div class=msg id=msg></div></div><div class=lnk id=swapTxt>ليس لديك حساب؟ <a id=swap>أنشئ حساب الآن</a></div></div><div class=ld id=ld><div class=spin></div></div><script type=module>
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import {getFirestore,doc,getDoc,setDoc,collection,query,where,getDocs,serverTimestamp} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
const $=i=>document.getElementById(i),ld=$("ld"),msg=$("msg");
const tbL=$("tbLogin"),tbR=$("tbReg"),fL=$("fLogin"),fR=$("fReg"),swap=$("swap"),swapTxt=$("swapTxt");
function show(v){ld.classList.toggle("on",!!v)}
function setMsg(t,k){msg.className="msg "+(k||"");msg.textContent=t||""}
function tab(r){const isR=!!r;tbL.classList.toggle("on",!isR);tbR.classList.toggle("on",isR);fL.style.display=isR?"none":"block";fR.style.display=isR?"block":"none";swapTxt.innerHTML=isR?'لديك حساب بالفعل؟ <a id=swap>سجل الدخول</a>':'ليس لديك حساب؟ <a id=swap>أنشئ حساب الآن</a>';document.getElementById("swap").onclick=()=>tab(!isR);setMsg("")}
tbL.onclick=()=>tab(0);tbR.onclick=()=>tab(1);swap.onclick=()=>tab(1);
$("lEye").onclick=()=>{const p=$("lPass");p.type=p.type=="password"?"text":"password"};
$("rEye").onclick=()=>{const p=$("rPass");p.type=p.type=="password"?"text":"password"};
// genUID: 6 digit numeric unique code
function genCode(){return String(Math.floor(100000+Math.random()*900000))}
async function uniqueCode(){for(let i=0;i<8;i++){const c=genCode();const q=query(collection(db,"users"),where("inviteCode","==",c));const r=await getDocs(q);if(r.empty)return c}return genCode()+String(Date.now()).slice(-2)}
// pre-fill from hash: #index=ref or ?ref=
function getRef(){const h=location.hash||"",s=location.search||"";let m=h.match(/[#&?]ref=([^&]+)/)||h.match(/index=([^&]+)/)||s.match(/[?&]ref=([^&]+)/);return m?decodeURIComponent(m[1]):""}
const refQ=getRef();if(refQ){$("rRef").value=refQ;tab(1);loadRef(refQ)}
$("rRef").oninput=()=>{const v=$("rRef").value.trim();if(v.length>=4)loadRef(v);else $("refBox").classList.remove("on")}
async function loadRef(code){try{const q=query(collection(db,"users"),where("inviteCode","==",code));const r=await getDocs(q);if(r.empty){$("refBox").classList.remove("on");return}const u=r.docs[0].data();$("refAvatar").src=u.avatar||"https://cdn-icons-png.flaticon.com/128/8004/8004218.png";$("refName").textContent=u.name||"مستخدم";$("refId").textContent="ID: "+(u.inviteCode||"");const dt=u.createdAt&&u.createdAt.toDate?u.createdAt.toDate().toLocaleDateString("ar-EG"):"-";$("refMeta").textContent="الرصيد: $"+(u.balance||0).toFixed?Number(u.balance||0).toFixed(2):(u.balance||0)+" • تاريخ الإنشاء: "+dt;$("refMeta").textContent="الرصيد: $"+Number(u.balance||0).toFixed(2)+" • تاريخ الإنشاء: "+dt;$("refBox").classList.add("on")}catch(e){console.warn(e)}}
$("btnLogin").onclick=async()=>{const e=$("lEmail").value.trim(),p=$("lPass").value;if(!e||!p){setMsg("يرجى تعبئة البريد وكلمة المرور","err");return}show(1);setMsg("");try{await signInWithEmailAndPassword(auth,e,p);setMsg("تم تسجيل الدخول، جارٍ التحويل...","ok");setTimeout(()=>location.href="index.html",400)}catch(err){setMsg(humanError(err),"err")}finally{show(0)}};
$("btnReg").onclick=async()=>{const n=$("rName").value.trim(),e=$("rEmail").value.trim(),p=$("rPass").value,r=$("rRef").value.trim();if(!n||!e||!p){setMsg("يرجى تعبئة جميع الحقول المطلوبة","err");return}if(p.length<6){setMsg("كلمة المرور يجب أن تكون 6 أحرف على الأقل","err");return}show(1);setMsg("");try{const cred=await createUserWithEmailAndPassword(auth,e,p);const code=await uniqueCode();let refUid="";if(r){const q=query(collection(db,"users"),where("inviteCode","==",r));const rs=await getDocs(q);if(!rs.empty)refUid=rs.docs[0].id}await setDoc(doc(db,"users",cred.user.uid),{uid:cred.user.uid,name:n,email:e,balance:0,vip:0,verified:"none",inviteCode:code,referredBy:refUid||null,avatar:"https://cdn-icons-png.flaticon.com/128/8004/8004218.png",createdAt:serverTimestamp()});setMsg("تم إنشاء الحساب بنجاح","ok");setTimeout(()=>location.href="index.html",500)}catch(err){setMsg(humanError(err),"err")}finally{show(0)}};
function humanError(err){const c=err&&err.code||"";if(c=="auth/email-already-in-use")return"البريد مستخدم بالفعل";if(c=="auth/invalid-email")return"البريد غير صالح";if(c=="auth/weak-password")return"كلمة المرور ضعيفة";if(c=="auth/invalid-credential"||c=="auth/wrong-password"||c=="auth/user-not-found")return"بيانات الدخول غير صحيحة";if(c=="auth/network-request-failed")return"خطأ في الشبكة";return err&&err.message||"حدث خطأ"}
onAuthStateChanged(auth,u=>{if(u){location.href="index.html"}});
</script></body></html>
