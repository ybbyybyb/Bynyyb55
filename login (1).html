<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/><meta name="theme-color" content="#070311"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><title>GIPOX • Pro Trading Platform</title><style>:root{--bg:#070311;--card:#1a1031;--card2:#12091f;--line:#6330a3;--line2:#a655ff;--txt:#fff;--muted:#eedbff;--acc:#df7bff;--green:#7cffb2;--red:#ff6b8a;--grad:linear-gradient(135deg,#21c8ff 0,#3f86ff 42%,#7a49ff 72%,#c13cff 100%)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}html,body{width:100%;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;background:#070311;color:#fff;-webkit-font-smoothing:antialiased}body{position:relative;overflow-x:hidden;background:radial-gradient(circle at 15% 20%,rgba(172,91,255,.18),transparent 22%),radial-gradient(circle at 85% 10%,rgba(255,121,215,.16),transparent 24%),radial-gradient(circle at 50% 80%,rgba(120,78,255,.14),transparent 28%),linear-gradient(180deg,#05020d 0,#090314 18%,#10071d 100%);min-height:100vh}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(2px 2px at 20px 30px,#fff,transparent 60%),radial-gradient(1.7px 1.7px at 140px 90px,rgba(255,220,255,.95),transparent 60%),radial-gradient(1.5px 1.5px at 260px 180px,rgba(255,255,255,.75),transparent 60%),radial-gradient(2px 2px at 80px 200px,rgba(223,123,255,.9),transparent 60%),radial-gradient(1.6px 1.6px at 320px 60px,rgba(255,255,255,.8),transparent 60%),radial-gradient(2px 2px at 420px 140px,rgba(255,141,244,.8),transparent 60%),radial-gradient(1.4px 1.4px at 520px 70px,rgba(255,255,255,.75),transparent 60%);background-size:650px 260px;opacity:.55;animation:tw 9s linear infinite;z-index:0}@keyframes tw{0%,100%{opacity:.45}50%{opacity:.75}}.app{position:relative;z-index:2;max-width:520px;margin:0 auto;min-height:100vh;padding:32px 22px 40px;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start}.brand{display:flex;flex-direction:column;align-items:center;margin-top:18px;margin-bottom:26px}.logo-box{width:96px;height:96px;border-radius:24px;background:var(--grad);display:grid;place-items:center;box-shadow:0 14px 40px rgba(123,73,255,.45),0 0 0 1px rgba(255,255,255,.06) inset;position:relative;overflow:hidden}.logo-box img{width:78%;height:78%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}.logo-fallback{font-size:54px;font-weight:900;color:#fff;letter-spacing:-2px;text-shadow:0 2px 8px rgba(0,0,0,.35)}.brand h1{margin-top:14px;font-size:30px;font-weight:900;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px}.brand p{margin-top:6px;color:var(--muted);font-size:13px;font-weight:600;opacity:.75;letter-spacing:.4px}.tabs{display:flex;background:rgba(26,16,49,.7);border:1px solid rgba(166,85,255,.22);border-radius:16px;padding:5px;margin-bottom:16px;backdrop-filter:blur(6px)}.tab{flex:1;text-align:center;padding:13px 0;font-size:15px;font-weight:700;color:var(--muted);border-radius:12px;cursor:pointer;transition:.25s;user-select:none}.tab.active{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(123,73,255,.35)}.field{position:relative;margin-bottom:12px}.field .ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--muted);opacity:.7;pointer-events:none}.field input{width:100%;height:58px;background:rgba(26,16,49,.55);border:1px solid rgba(166,85,255,.25);border-radius:14px;color:#fff;font-size:15px;font-weight:600;padding:0 56px 0 52px;outline:none;transition:.25s;font-family:inherit}.field input::placeholder{color:var(--muted);opacity:.6;font-weight:500}.field input:focus{border-color:var(--line2);box-shadow:0 0 0 3px rgba(166,85,255,.18),0 0 24px rgba(166,85,255,.22) inset}.field .right-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--acc);font-size:12px;font-weight:800;letter-spacing:1px;padding:8px 12px;cursor:pointer;border-radius:10px;transition:.2s}.field .right-btn:hover{background:rgba(166,85,255,.12)}.field .right-btn.verify{border:1px solid rgba(166,85,255,.4)}.hint{margin:-4px 4px 14px;color:var(--acc);font-size:12px;font-weight:700;text-align:center;opacity:.75}.btn-primary{width:100%;height:60px;border:none;background:var(--grad);color:#fff;font-size:17px;font-weight:800;letter-spacing:.5px;border-radius:16px;cursor:pointer;margin-top:8px;box-shadow:0 12px 32px rgba(123,73,255,.4),0 0 0 1px rgba(255,255,255,.08) inset;transition:.2s;font-family:inherit}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 16px 38px rgba(123,73,255,.5)}.btn-primary:active{transform:translateY(1px)}.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}.switch-line{text-align:center;margin-top:18px;color:var(--muted);font-size:13px;font-weight:600;opacity:.8}.switch-line a{color:var(--acc);text-decoration:none;font-weight:800;margin-left:4px;cursor:pointer}.form{display:none;animation:fade .35s ease}.form.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.msg{margin:10px 2px;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;display:none;text-align:center}.msg.show{display:block}.msg.err{background:rgba(255,107,138,.12);color:#ff8aa5;border:1px solid rgba(255,107,138,.3)}.msg.ok{background:rgba(124,255,178,.1);color:var(--green);border:1px solid rgba(124,255,178,.28)}.msg.info{background:rgba(166,85,255,.12);color:#d9b3ff;border:1px solid rgba(166,85,255,.28)}.invite-status{margin:-6px 4px 10px;font-size:12px;font-weight:700;text-align:center;display:none}.invite-status.ok{color:var(--green);display:block}.invite-status.err{color:#ff8aa5;display:block}.loader{position:fixed;inset:0;background:rgba(7,3,17,.92);z-index:99;display:grid;place-items:center;backdrop-filter:blur(10px)}.loader .spin{width:54px;height:54px;border:4px solid rgba(166,85,255,.2);border-top-color:var(--line2);border-radius:50%;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.hidden{display:none!important}.eye-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:0}</style></head><body><div class="loader" id="loader"><div class="spin"></div></div><div class="app hidden" id="app"><div class="brand"><div class="logo-box"><img id="brandLogo" src="https://i.ibb.co/wrdyDXv4/file-00000000ec287246a200205153057186.png" alt="GIPOX" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"/><div class="logo-fallback" style="display:none">G</div></div><h1>GIPOX</h1><p>Pro Trading Platform</p></div><div class="tabs"><div class="tab" id="tabSignin" data-tab="signin">Sign In</div><div class="tab active" id="tabSignup" data-tab="signup">Create Account</div></div><div class="msg" id="msg"></div><form class="form" id="signinForm" autocomplete="on" novalidate><div class="field"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg><input type="email" id="siEmail" placeholder="Email address" autocomplete="email" required/></div><div class="field"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><input type="password" id="siPass" placeholder="Password" autocomplete="current-password" required minlength="6"/><button type="button" class="right-btn" id="siShow">SHOW</button></div><button type="submit" class="btn-primary" id="siBtn">Sign In</button><div class="switch-line">Don't have an account? <a data-tab="signup">Create one</a></div></form><form class="form active" id="signupForm" autocomplete="on" novalidate><div class="field"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg><input type="text" id="suName" placeholder="Full name" autocomplete="name" required/></div><div class="field"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg><input type="email" id="suEmail" placeholder="Email address" autocomplete="email" required/></div><div class="field"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><input type="password" id="suPass" placeholder="Create password (min 6)" autocomplete="new-password" required minlength="6"/><button type="button" class="right-btn" id="suShow">SHOW</button></div><div class="field"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/></svg><input type="text" id="suInvite" placeholder="Invitation code (optional)" autocomplete="off"/><button type="button" class="right-btn verify" id="suVerify">VERIFY</button></div><div class="invite-status" id="inviteStatus"></div><div class="hint">Enter a valid code to receive a welcome bonus</div><button type="submit" class="btn-primary" id="suBtn">Create Account</button><div class="switch-line">Already have an account? <a data-tab="signin">Sign in</a></div></form></div><script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,updateProfile}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,updateDoc,serverTimestamp,collection,query,where,getDocs,limit}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};
const HOME_URL="assets.html";
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
const $=id=>document.getElementById(id);
const loader=$("loader"),appEl=$("app"),msg=$("msg");
const showLoader=()=>loader.classList.remove("hidden");
const hideLoader=()=>loader.classList.add("hidden");
const showMsg=(t,k)=>{msg.textContent=t;msg.className="msg show "+(k||"info");setTimeout(()=>{msg.classList.remove("show")},5000)};
const norm=s=>String(s||"").trim();
const lower=s=>norm(s).toLowerCase();
const upper=s=>norm(s).toUpperCase();

// ---------- Tabs ----------
function switchTab(name){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));$(name==="signin"?"signinForm":"signupForm").classList.add("active");msg.classList.remove("show")}
document.querySelectorAll("[data-tab]").forEach(el=>el.addEventListener("click",e=>{e.preventDefault();switchTab(el.dataset.tab)}));

// ---------- Show / hide password ----------
function bindShow(btnId,inpId){const b=$(btnId),i=$(inpId);b.addEventListener("click",()=>{const isPwd=i.type==="password";i.type=isPwd?"text":"password";b.textContent=isPwd?"HIDE":"SHOW"})}
bindShow("siShow","siPass");bindShow("suShow","suPass");

// ---------- Read invitation code from URL (?ref=CODE | ?invite=CODE | ?code=CODE) ----------
function getRefFromURL(){const p=new URLSearchParams(location.search);const r=p.get("ref")||p.get("invite")||p.get("code")||"";return lower(r)}
const urlRef=getRefFromURL();
if(urlRef){
  $("suInvite").value=urlRef;
  try{sessionStorage.setItem("gipox_ref",urlRef);localStorage.setItem("gipox_ref",urlRef)}catch(e){}
  switchTab("signup");
  // auto-verify after a tick so the user sees feedback immediately
  setTimeout(()=>{ try{$("suVerify").click()}catch(e){} },200);
}else{
  try{const stored=sessionStorage.getItem("gipox_ref")||localStorage.getItem("gipox_ref");if(stored)$("suInvite").value=stored}catch(e){}
}

// ---------- Verify invitation code against Firestore users collection ----------
// Tries every reasonable variant of the code so a single source of truth (the
// referralCode field generated in referral.html) is always recognised.
async function findUserByCode(code){
  const c=lower(code);
  if(!c) return null;
  const cu=upper(code);
  const tries=[
    ["referralCode", c],
    ["referralCode", cu],
    ["inviteCode",   c],
    ["inviteCode",   cu],
    ["userCode",     cu],
    ["userCode",     c]
  ];
  for(const [field,val] of tries){
    try{
      const qy=query(collection(db,"users"),where(field,"==",val),limit(1));
      const s=await getDocs(qy);
      if(!s.empty){const d=s.docs[0];return{id:d.id,...d.data()}}
    }catch(e){ /* security rules may block pre-auth reads; keep trying */ }
  }
  return null;
}

const inviteStatus=$("inviteStatus");
let verifiedRef=null;          // last successfully verified code
let verifiedOwner=null;        // owner doc cached after verification

$("suInvite").addEventListener("input",()=>{verifiedRef=null;verifiedOwner=null;inviteStatus.className="invite-status";inviteStatus.textContent=""});

$("suVerify").addEventListener("click",async()=>{
  const code=lower($("suInvite").value);
  if(!code){inviteStatus.className="invite-status err";inviteStatus.textContent="Please enter a code";return}
  inviteStatus.className="invite-status";inviteStatus.textContent="Verifying…";
  const u=await findUserByCode(code);
  if(u){
    verifiedRef=code;
    verifiedOwner=u;
    inviteStatus.className="invite-status ok";
    inviteStatus.textContent="✓ Valid code — welcome bonus unlocked";
  }else{
    // We can't always read users collection BEFORE signing in (Firestore rules).
    // Don't block the user — accept the code provisionally and re-verify after sign-up.
    verifiedRef=code;
    verifiedOwner=null;
    inviteStatus.className="invite-status ok";
    inviteStatus.textContent="✓ Code accepted — will be verified after sign-up";
  }
});

function teamCodeGen(){return"ref"+Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,4)}
function userCodeGen(){return"U"+Math.floor(1e4+Math.random()*9e4)}

// ---------- Pending-ref helper: link an invite code AFTER auth ----------
async function linkPendingReferral(user,codeRaw){
  const code=lower(codeRaw);
  if(!user||!code) return false;
  try{
    const meRef=doc(db,"users",user.uid);
    const meSnap=await getDoc(meRef);
    const me=meSnap.exists()?meSnap.data():{};
    // Already linked? leave alone.
    if(lower(me.referredBy)) return false;
    // Don't allow self-referral
    if(lower(me.referralCode)===code) return false;
    const owner=await findUserByCode(code);
    if(!owner) return false;
    if(owner.id===user.uid || lower(owner.uid)===lower(user.uid)) return false;
    await setDoc(meRef,{
      referredBy:code,
      referrerUid:owner.uid||owner.id||"",
      welcomeBonus:(me.welcomeBonus|0)||10,
      updatedAt:serverTimestamp()
    },{merge:true});
    try{sessionStorage.removeItem("gipox_ref");localStorage.removeItem("gipox_ref")}catch(e){}
    return true;
  }catch(e){console.warn("linkPendingReferral",e);return false}
}

// ---------- Sign In ----------
$("signinForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const email=$("siEmail").value.trim(),pass=$("siPass").value;
  if(!email||!pass){showMsg("Please fill in all fields","err");return}
  const btn=$("siBtn");btn.disabled=true;btn.textContent="Signing in…";
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pass);
    // After login, if there's a pending invite code from URL/storage and the
    // user has no referrer yet, link it now (authenticated reads are allowed).
    let pending="";
    try{pending=sessionStorage.getItem("gipox_ref")||localStorage.getItem("gipox_ref")||""}catch(e){}
    if(pending) await linkPendingReferral(cred.user,pending);
    showMsg("Signed in successfully","ok");
  }catch(err){
    let m="Sign in failed";
    if(err.code==="auth/invalid-credential"||err.code==="auth/wrong-password"||err.code==="auth/user-not-found")m="Invalid email or password";
    else if(err.code==="auth/invalid-email")m="Invalid email format";
    else if(err.code==="auth/too-many-requests")m="Too many attempts. Try again later";
    else if(err.code==="auth/network-request-failed")m="Network error. Check your connection";
    showMsg(m,"err");btn.disabled=false;btn.textContent="Sign In";
  }
});

// ---------- Sign Up ----------
$("signupForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const name=$("suName").value.trim(),email=$("suEmail").value.trim(),pass=$("suPass").value,inv=lower($("suInvite").value);
  if(!name||!email||!pass){showMsg("Please fill in all required fields","err");return}
  if(pass.length<6){showMsg("Password must be at least 6 characters","err");return}
  const btn=$("suBtn");btn.disabled=true;btn.textContent="Creating account…";
  try{
    // Pre-auth lookup (may fail because of rules — that's fine, we re-try after sign-up)
    let refOwner=verifiedOwner||null;
    if(inv && !refOwner){ refOwner=await findUserByCode(inv); }

    // Create the account first — Firestore rules typically allow reads only when authenticated
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const uid=cred.user.uid;
    try{await updateProfile(cred.user,{displayName:name})}catch(e){}

    // Re-try lookup post-auth (now we have credentials)
    if(inv && !refOwner){ refOwner=await findUserByCode(inv); }

    // Block self-referral
    if(refOwner && (refOwner.id===uid || lower(refOwner.uid)===lower(uid))) refOwner=null;

    const myReferralCode=teamCodeGen();
    const myUserCode=userCodeGen();
    const payload={
      uid,email,name,
      displayName:name,
      referralCode:myReferralCode,
      userCode:myUserCode,
      inviteCode:"",
      referredBy: inv && refOwner ? inv : "",
      referrerUid: refOwner ? (refOwner.uid||refOwner.id||"") : "",
      loginType:"email",
      phone:"",
      todayProfit:0,
      welcomeBonus: (inv && refOwner) ? 10 : 0,
      createdAt:serverTimestamp(),
      updatedAt:serverTimestamp()
    };
    await setDoc(doc(db,"users",uid),payload,{merge:true});

    // Clear any pending invite stored in browser
    try{sessionStorage.removeItem("gipox_ref");localStorage.removeItem("gipox_ref")}catch(e){}

    if(inv && !refOwner){
      showMsg("Account created — invitation code could not be verified, please contact your inviter","info");
    }else if(inv && refOwner){
      showMsg("Account created — invitation code accepted ✓","ok");
    }else{
      showMsg("Account created successfully","ok");
    }
  }catch(err){
    let m="Sign up failed";
    if(err.code==="auth/email-already-in-use")m="Email already registered. Try signing in.";
    else if(err.code==="auth/invalid-email")m="Invalid email format";
    else if(err.code==="auth/weak-password")m="Password is too weak";
    else if(err.code==="auth/network-request-failed")m="Network error. Check your connection";
    showMsg(m,"err");btn.disabled=false;btn.textContent="Create Account";
  }
});

// ---------- Persistent session check ----------
onAuthStateChanged(auth,async user=>{
  if(user){
    // If a pending invite is still stored, try to attach it before redirect
    let pending="";
    try{pending=sessionStorage.getItem("gipox_ref")||localStorage.getItem("gipox_ref")||""}catch(e){}
    if(pending){ try{await linkPendingReferral(user,pending)}catch(e){} }
    location.replace(HOME_URL);
  }else{
    hideLoader();appEl.classList.remove("hidden");
  }
});
</script><script defer src="https://static.cloudflareinsights.com/beacon.min.js/v833ccba57c9e4d2798f2e76cebdd09a11778172276447" integrity="sha512-57MDmcccJXYtNnH+ZiBwzC4jb2rvgVCEokYN+L/nLlmO8rfYT/gIpW2A569iJ/3b+0UEasghjuZH/ma3wIs/EQ==" data-cf-beacon='{"version":"2024.11.0","token":"4edd5f8ec12a48cfa682ab8261b80a79","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body></html>
