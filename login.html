<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP Auth</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #161714;
      --panel: #181916;
      --field: #8a6a2a;
      --field-focus: #9d7830;
      --gold: #efb34a;
      --gold-2: #ffbf59;
      --text: #f8f5ef;
      --muted: #8e8a80;
      --line: rgba(255,255,255,.12);
      --dark-btn: #151613;
      --white: #fff;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255,191,89,.05), transparent 30%),
        linear-gradient(180deg, #181916 0%, #141512 100%);
      color: var(--text);
      font-family: "Tahoma", "Arial", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
      padding: 12px 18px 30px;
      overflow: hidden;
      background: transparent;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .mini-btn, .lang-btn {
      border: 1px solid rgba(255,255,255,.07);
      background: #24231f;
      color: var(--text);
      border-radius: 12px;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mini-btn {
      width: 40px;
      font-size: 18px;
    }

    .lang-btn {
      padding: 0 12px;
      gap: 6px;
      color: #f0d6a0;
      font-size: 14px;
    }

    .logo-wrap {
      width: 110px;
      height: 110px;
      margin: 8px auto 6px;
      position: relative;
    }

    .diamond {
      position: absolute;
      transform: rotate(45deg);
      background: #f7b800;
    }

    .a { width: 44px; height: 44px; top: 0; left: 33px; }
    .b { width: 18px; height: 18px; top: 27px; left: 8px; }
    .c { width: 18px; height: 18px; top: 27px; right: 8px; }
    .d { width: 24px; height: 24px; top: 30px; left: 43px; }
    .e { width: 44px; height: 44px; top: 44px; left: 33px; }

    .hole {
      position: absolute;
      width: 12px;
      height: 12px;
      top: 36px;
      left: 49px;
      background: var(--bg);
      transform: rotate(45deg);
      z-index: 2;
    }

    .brand {
      text-align: center;
      color: var(--gold);
      font-size: 28px;
      letter-spacing: 1px;
      margin-bottom: 22px;
      font-weight: 500;
    }

    .mode-switch {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 28px;
    }

    .switch-btn {
      flex: 1;
      background: none;
      border: 0;
      color: #74726c;
      font-size: 17px;
      font-weight: 700;
      padding: 4px 0 12px;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      text-align: center;
      line-height: 1.5;
    }

    .switch-btn.active {
      color: var(--white);
      border-bottom-color: var(--white);
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group label {
      display: block;
      color: #aaa59a;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .input-wrap {
      height: 60px;
      background: var(--field);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      transition: .2s ease;
    }

    .input-wrap:focus-within {
      background: var(--field-focus);
      box-shadow: 0 0 0 2px rgba(255,191,89,.12);
    }

    .input-icon, .toggle-eye {
      width: 24px;
      min-width: 24px;
      text-align: center;
      font-size: 20px;
      color: #fff5dc;
      opacity: .95;
    }

    .toggle-eye {
      background: none;
      border: 0;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
    }

    .prefix {
      color: #fff3d6;
      font-size: 16px;
      white-space: nowrap;
    }

    .input-wrap input {
      flex: 1;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 16px;
      direction: rtl;
    }

    .input-wrap input::placeholder {
      color: #d6c49a;
    }

    .input-wrap.phone input {
      direction: ltr;
      text-align: right;
    }

    .submit-btn, .ghost-btn {
      height: 58px;
      width: 100%;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
      margin-top: 2px;
    }

    .submit-btn {
      background: linear-gradient(180deg, #ffc560 0%, #f0ae45 100%);
      color: #fff;
      border: 0;
      box-shadow: 0 10px 20px rgba(240,174,69,.18);
    }

    .ghost-btn {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,.75);
    }

    .contact-bar {
      position: fixed;
      left: 0;
      top: 72%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      background: #20211f;
      color: #fff;
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
      padding: 10px 6px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,.08);
      z-index: 20;
      user-select: none;
    }

    .contact-bar small {
      display: block;
      margin-top: 8px;
      text-align: center;
      font-size: 15px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 380px) {
      .switch-btn {
        font-size: 15px;
      }
      .brand {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>
  <aside class="contact-bar">
    Contact us
    <small>💬</small>
  </aside>

  <div class="screen">
    <div class="top-row">
      <button class="mini-btn" type="button" aria-label="الدعم">🎧</button>
      <button class="lang-btn" type="button" aria-label="اللغة">🌐 عربي</button>
    </div>

    <div class="logo-wrap" aria-hidden="true">
      <div class="diamond a"></div>
      <div class="diamond b"></div>
      <div class="diamond c"></div>
      <div class="diamond d"></div>
      <div class="diamond e"></div>
      <div class="hole"></div>
    </div>

    <div class="brand">VIP PLATFORM</div>

    <div class="mode-switch">
      <button id="tabEmail" class="switch-btn" type="button">التسجيل بالبريد الإلكتروني</button>
      <button id="tabPhone" class="switch-btn active" type="button">التسجيل عبر الهاتف</button>
    </div>

    <form id="authForm" class="form" novalidate>
      <div class="field-group">
        <label id="idLabel">رقم التليفون</label>
        <div id="idWrap" class="input-wrap phone">
          <span id="idIcon" class="input-icon">📞</span>
          <span id="phonePrefix" class="prefix">+1</span>
          <input id="identityInput" type="tel" placeholder="رقم التليفون" />
        </div>
      </div>

      <div class="field-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="passwordInput" type="password" placeholder="كلمة المرور" />
          <button class="toggle-eye" type="button" data-target="passwordInput">👁</button>
        </div>
      </div>

      <div id="confirmGroup" class="field-group">
        <label>إعادة إدخال كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="confirmInput" type="password" placeholder="إعادة إدخال كلمة المرور" />
          <button class="toggle-eye" type="button" data-target="confirmInput">👁</button>
        </div>
      </div>

      <div id="inviteGroup" class="field-group">
        <label>شفرة الدعوة</label>
        <div class="input-wrap">
          <span class="input-icon">👍</span>
          <input id="inviteInput" type="text" value="838083" readonly />
        </div>
      </div>

      <button id="primaryBtn" class="submit-btn" type="submit">اشترك</button>
      <button id="secondaryBtn" class="ghost-btn" type="button">تسجيل الدخول</button>
    </form>
  </div>

  <script>
    const tabPhone = document.getElementById("tabPhone");
    const tabEmail = document.getElementById("tabEmail");
    const idLabel = document.getElementById("idLabel");
    const idWrap = document.getElementById("idWrap");
    const idIcon = document.getElementById("idIcon");
    const phonePrefix = document.getElementById("phonePrefix");
    const identityInput = document.getElementById("identityInput");
    const confirmGroup = document.getElementById("confirmGroup");
    const inviteGroup = document.getElementById("inviteGroup");
    const primaryBtn = document.getElementById("primaryBtn");
    const secondaryBtn = document.getElementById("secondaryBtn");
    const authForm = document.getElementById("authForm");

    let activeMethod = "phone"; // phone | email
    let activeMode = "signup";  // signup | login

    function render() {
      const isPhone = activeMethod === "phone";
      const isSignup = activeMode === "signup";

      tabPhone.textContent = isSignup ? "التسجيل عبر الهاتف" : "تسجيل الدخول عبر الهاتف";
      tabEmail.textContent = isSignup ? "التسجيل بالبريد الإلكتروني" : "تسجيل الدخول بالبريد الإلكتروني";

      tabPhone.classList.toggle("active", isPhone);
      tabEmail.classList.toggle("active", !isPhone);

      if (isPhone) {
        idLabel.textContent = "رقم التليفون";
        idIcon.textContent = "📞";
        phonePrefix.classList.remove("hidden");
        idWrap.classList.add("phone");
        identityInput.type = "tel";
        identityInput.placeholder = "رقم التليفون";
        identityInput.value = "";
      } else {
        idLabel.textContent = "بريد إلكتروني";
        idIcon.textContent = "✉";
        phonePrefix.classList.add("hidden");
        idWrap.classList.remove("phone");
        identityInput.type = "email";
        identityInput.placeholder = "بريد إلكتروني";
        identityInput.value = "";
      }

      confirmGroup.classList.toggle("hidden", !isSignup);
      inviteGroup.classList.toggle("hidden", !isSignup);

      primaryBtn.textContent = isSignup ? "اشترك" : "تسجيل الدخول";
      secondaryBtn.textContent = isSignup ? "تسجيل الدخول" : "اشترك";
    }

    tabPhone.addEventListener("click", () => {
      activeMethod = "phone";
      render();
    });

    tabEmail.addEventListener("click", () => {
      activeMethod = "email";
      render();
    });

    secondaryBtn.addEventListener("click", () => {
      activeMode = activeMode === "signup" ? "login" : "signup";
      render();
    });

    document.querySelectorAll(".toggle-eye").forEach(btn => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === "password" ? "text" : "password";
      });
    });

    authForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const identity = identityInput.value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      const confirm = document.getElementById("confirmInput").value.trim();

      if (!identity) {
        alert(activeMethod === "phone" ? "من فضلك أدخل رقم التليفون" : "من فضلك أدخل البريد الإلكتروني");
        return;
      }

      if (!password) {
        alert("من فضلك أدخل كلمة المرور");
        return;
      }

      if (activeMode === "signup") {
        if (!confirm) {
          alert("من فضلك أعد إدخال كلمة المرور");
          return;
        }

        if (password !== confirm) {
          alert("كلمتا المرور غير متطابقتين");
          return;
        }

        alert("تم تجهيز نموذج إنشاء الحساب بنجاح");
      } else {
        alert("تم تجهيز نموذج تسجيل الدخول بنجاح");
      }
    });

    render();
  </script>
</body>
</html>
