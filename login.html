{from{filter:brightness(.85)}to{filter:brightness(1.4)}}.logo-wrap{width:140px;height:140px;margin:8px auto 6px;display:flex;align-items:center;justify-content:center}.logo-wrap img{width:132px;height:132px;object-fit:contain;display:block;filter:drop-shadow(0 0 14px rgba(120,232,255,.18))}.brand{text-align:center;color:var(--gold);font-size:28px;letter-spacing:1px;margin-bottom:22px;font-weight:500}.mode-switch{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:28px}.switch-btn{flex:1;background:none;border:0;color:#9a8fc0;font-size:17px;font-weight:700;padding:4px 0 12px;border-bottom:3px solid transparent;cursor:pointer;text-align:center;line-height:1.5}.switch-btn.active{color:var(--white);border-bottom-color:var(--gold)}.form{display:flex;flex-direction:column;gap:18px}.field-group label{display:block;color:#c7bfdf;font-size:14px;margin-bottom:8px}.input-wrap{height:60px;background:var(--field);border-radius:16px;display:flex;align-items:center;padding:0 14px;gap:10px;transition:.2s ease;border:1px solid rgba(255,255,255,.06)}.input-wrap:focus-within{background:var(--field-focus);box-shadow:0 0 0 2px rgba(120,232,255,.14)}.input-icon,.toggle-eye{width:24px;min-width:24px;color:#eefbff;opacity:.95;display:flex;align-items:center;justify-content:center}.input-icon svg,.toggle-eye svg{width:21px;height:21px;display:block;stroke:currentColor}.toggle-eye{background:none;border:0;cursor:pointer;padding:0}.prefix{color:#eefbff;font-size:16px;white-space:nowrap}.input-wrap input{flex:1;height:100%;border:0;outline:0;background:transparent;color:#fff;font-size:16px;direction:rtl}.input-wrap input::placeholder{color:#ded3ff}.input-wrap.phone input{direction:ltr;text-align:right}.submit-btn,.ghost-btn{height:58px;width:100%;border-radius:30px;font-size:17px;font-weight:700;cursor:pointer;transition:.2s ease;margin-top:2px}.submit-btn{background:linear-gradient(180deg,#83efff 0%,#9c75ff 100%);color:#fff;border:0;box-shadow:0 10px 20px rgba(123,166,255,.20)}.ghost-btn{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.75)}.hidden{display:none!important}.loading-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#171032 0%,#120a2a 100%);color:#fff;flex-direction:column;gap:14px}.loading-text{font-size:18px;font-weight:700;color:#8eefff}.dots:after{content:"";display:inline-block;animation:dots 1.4s infinite steps(4,end);width:24px;text-align:right}@keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}#msg{text-align:center;font-size:14px;color:#ffcfbf;min-height:20px;margin-top:-6px;margin-bottom:-4px;white-space:pre-line}@media (max-width:380px){.switch-btn{font-size:15px}.brand{font-size:25px}}</style></head><body><div id="loadingScreen" class="loading-screen"><div class="loading-text">جاري التحقق من الجلسة<span class="dots"></span></div></div><div class="screen"><div class="logo-wrap"><img src="https://cdn-icons-png.flaticon.com/128/3791/3791579.png" alt="GLOBAL VIP"></div><div class="brand">GLOBAL VIP</div><div class="mode-switch"><button id="tabEmail" class="switch-btn" type="button">التسجيل بالبريد الإلكتروني</button><button id="tabPhone" class="switch-btn active" type="button">التسجيل عبر الهاتف</button></div><form id="authForm" class="form" novalidate><div id="msg"></div><div class="field-group"><label id="idLabel">رقم التليفون</label><div id="idWrap" class="input-wrap phone"><span id="idIcon" class="input-icon">📞</span><span id="phonePrefix" class="prefix">+1</span><input id="identityInput" type="tel" placeholder="رقم التليفون"/></div></div><div id="otpGroup" class="field-group hidden"><label>رمز التحقق</label><div class="input-wrap"><span class="input-icon">🔢</span><input id="otpInput" type="text" inputmode="numeric" placeholder="أدخل رمز التحقق"/></div></div><div id="passwordGroup" class="field-group"><label>كلمة المرور</label><div class="input-wrap "round" stroke-linejoin="round"/><rect x="3" y="8" width="18" height="12" rx="2.5" stroke-width="2"/><path d="M9 12h6M9 16h3" stroke-width="2" stroke-linecap="round"/></svg>';let activeMethod="phone",activeMode="signup",confirmationResult=null,recaptchaVerifier=null;eyePass.innerHTML=eyeSvg;eyeConfirm.innerHTML=eyeSvg;inviteIcon.innerHTML=inviteSvg;function setMsg(t="",ok=0){msg.style.color=ok?"#9effd1":"#ffcfbf";msg.textContent=t}function hideLoading(){loadingScreen.style.display="none"}function redirectNow(){location.replace("index.html")}function render(){const isPhone=activeMethod==="phone",isSignup=activeMode==="signup",otpSent=!!confirmationResult;tabPhone.textContent=isSignup?"التسجيل عبر الهاتف":"تسجيل الدخول عبر الهاتف";tabEmail.textContent=isSignup?"التسجيل بالبريد الإلكتروني":"تسجيل الدخول بالبريد الإلكتروني";tabPhone.classList.toggle("active",isPhone);tabEmail.classList.toggle("active",!isPhone);if(isPhone){idLabel.textContent="رقم التليفون";idIcon.textContent="📞";phonePrefix.classList.remove("hidden");idWrap.classList.add("phone");identityInput.type="tel";identityInput.placeholder="رقم التليفون";passwordGroup.classList.add("hidden");confirmGroup.classList.add("hidden");otpGroup.classList.toggle("hidden",!otpSent)}else{idLabel.textContent="بريد إلكتروني";idIcon.innerHTML=mailSvg;phonePrefix.classList.add("hidden");idWrap.classList.remove("phone");identityInput.type="email";identityInput.placeholder="بريد إلكتروني";passwordGroup.classList.remove("hidden");confirmGroup.classList.toggle("hidden",!isSignup);otpGroup.classList.add("hidden")}inviteGroup.classList.toggle("hidden",!isSignup);primaryBtn.textContent=isPhone?(otpSent?"تأكيد الرمز":"إرسال الرمز"):(isSignup?"اشترك":"تسجيل الدخول");secondaryBtn.textContent=isSignup?"تسجيل الدخول":"اشترك";setMsg("")}tabPhone.addEventListener("click",()=>{activeMethod="phone";confirmationResult=null;render()});tabEmail.addEventListener("click",()=>{activeMethod="email";confirmationResult=null;render()});secondaryBtn.add
