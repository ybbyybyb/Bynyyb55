<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><meta name="theme-color" content="#161714"/><link rel="icon" href="https://cdn-icons-png.flaticon.com/128/3791/3791579.png"><title>GLOBAL VIP</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--bg:#161714;--panel:#181916;--field:#8a6a2a;--field-focus:#9d7830;--gold:#efb34a;--gold-2:#ffbf59;--text:#f8f5ef;--muted:#8e8a80;--line:rgba(255,255,255,.12);--dark-btn:#151613;--white:#fff}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,rgba(255,191,89,.05),transparent 30%),linear-gradient(180deg,#181916 0%,#141512 100%);color:var(--text);font-family:Tahoma,Arial,sans-serif}body{display:flex;justify-content:center}.screen{width:100%;max-width:none;min-height:100vh;position:relative;padding:12px 18px 30px;overflow:hidden;background:transparent}.logo-wrap{width:140px;height:140px;margin:8px auto 6px;display:flex;align-items:center;justify-content:center}.logo-wrap img{width:132px;height:132px;object-fit:contain;display:block}.brand{text-align:center;color:var(--gold);font-size:28px;letter-spacing:1px;margin-bottom:22px;font-weight:500}.mode-switch{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:28px}.switch-btn{flex:1;background:none;border:0;color:#74726c;font-size:17px;font-weight:700;padding:4px 0 12px;border-bottom:3px solid transparent;cursor:pointer;text-align:center;line-height:1.5}.switch-btn.active{color:var(--white);border-bottom-color:var(--white)}.form{display:flex;flex-direction:column;gap:18px}.field-group label{display:block;color:#aaa59a;font-size:14px;margin-bottom:8px}.input-wrap{height:60px;background:var(--field);border-radius:16px;display:flex;align-items:center;padding:0 14px;gap:10px;transition:.2s ease}.input-wrap:focus-within{background:var(--field-focus);box-shadow:0 0 0 2px rgba(255,191,89,.12)}.input-icon,.toggle-eye{width:24px;min-width:24px;color:#fff5dc;opacity:.95;display:flex;align-items:center;justify-content:center}.input-icon svg,.toggle-eye svg{width:21px;height:21px;display:block;stroke:currentColor}.toggle-eye{background:none;border:0;cursor:pointer;padding:0}.prefix{color:#fff3d6;font-size:16px;white-space:nowrap}.input-wrap input{flex:1;height:100%;border:0;outline:0;background:transparent;color:#fff;font-size:16px;direction:rtl}.input-wrap input::placeholder{color:#d6c49a}.input-wrap.phone input{direction:ltr;text-align:right}.submit-btn,.ghost-btn{height:58px;width:100%;border-radius:30px;font-size:17px;font-weight:700;cursor:pointer;transition:.2s ease;margin-top:2px}.submit-btn{background:linear-gradient(180deg,#ffc560 0%,#f0ae45 100%);color:#fff;border:0;box-shadow:0 10px 20px rgba(240,174,69,.18)}.ghost-btn{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.75)}.hidden{display:none!important}@media (max-width:380px){.switch-btn{font-size:15px}.brand{font-size:25px}}</style></head><body><div class="screen"><div class="logo-wrap"><img src="https://cdn-icons-png.flaticon.com/128/3791/3791579.png" alt="GLOBAL VIP"></div><div class="brand">GLOBAL VIP</div><div class="mode-switch"><button id="tabEmail" class="switch-btn" type="button">التسجيل بالبريد الإلكتروني</button><button id="tabPhone" class="switch-btn active" type="button">التسجيل عبر الهاتف</button></div><form id="authForm" class="form" novalidate><div class="field-group"><label id="idLabel">رقم التليفون</label><div id="idWrap" class="input-wrap phone"><span id="idIcon" class="input-icon">📞</span><span id="phonePrefix" class="prefix">+1</span><input id="identityInput" type="tel" placeholder="رقم التليفون"/></div></div><div class="field-group"><label>كلمة المرور</label><div class="input-wrap"><span class="input-icon">🔒</span><input id="passwordInput" type="password" placeholder="كلمة المرور"/><button id="eyePass" class="toggle-eye" type="button" data-target="passwordInput"></button></div></div><div id="confirmGroup" class="field-group"><label>إعادة إدخال كلمة المرور</label><div class="input-wrap"><span class="input-icon">🔒</span><input id="confirmInput" type="password" placeholder="إعادة إدخال كلمة المرور"/><button id="eyeConfirm" class="toggle-eye" type="button" data-target="confirmInput"></button></div></div><div id="inviteGroup" class="field-group"><label>شفرة الدعوة</label><div class="input-wrap"><span id="inviteIcon" class="input-icon"></span><input id="inviteInput" type="text" value="838083" readonly/></div></div><button id="primaryBtn" class="submit-btn" type="submit">اشترك</button><button id="secondaryBtn" class="ghost-btn" type="button">تسجيل الدخول</button></form></div><script>const tabPhone=document.getElementById("tabPhone"),tabEmail=document.getElementById("tabEmail"),idLabel=document.getElementById("idLabel"),idWrap=document.getElementById("idWrap"),idIcon=document.getElementById("idIcon"),phonePrefix=document.getElementById("phonePrefix"),identityInput=document.getElementById("identityInput"),confirmGroup=document.getElementById("confirmGroup"),inviteGroup=document.getElementById("inviteGroup"),primaryBtn=document.getElementById("primaryBtn"),secondaryBtn=document.getElementById("secondaryBtn"),authForm=document.getElementById("authForm"),eyePass=document.getElementById("eyePass"),eyeConfirm=document.getElementById("eyeConfirm"),inviteIcon=document.getElementById("inviteIcon"),mailSvg='<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="3" stroke-width="2"/><path d="M5 8l7 5 7-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',eyeSvg='<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke-width="2"/></svg>',eyeOffSvg='<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l18 18" stroke-width="2" stroke-linecap="round"/><path d="M10.6 10.7A3 3 0 0 0 13.3 13.4" stroke-width="2" stroke-linecap="round"/><path d="M9.9 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10.5 7 10.5 7a17.2 17.2 0 0 1-3.4 4.2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.2 6.3A17.7 17.7 0 0 0 1.5 12S5.5 19 12 19a10.7 10.7 0 0 0 2.2-.2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',inviteSvg='<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 8.5V6a2 2 0 0 1 2-2h4l1.5 2H18a2 2 0 0 1 2 2v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="8" width="18" height="12" rx="2.5" stroke-width="2"/><path d="M9 12h6M9 16h3" stroke-width="2" stroke-linecap="round"/></svg>';let activeMethod="phone",activeMode="signup";eyePass.innerHTML=eyeSvg;eyeConfirm.innerHTML=eyeSvg;inviteIcon.innerHTML=inviteSvg;function render(){const e=activeMethod==="phone",t=activeMode==="signup";tabPhone.textContent=t?"التسجيل عبر الهاتف":"تسجيل الدخول عبر الهاتف";tabEmail.textContent=t?"التسجيل بالبريد الإلكتروني":"تسجيل الدخول بالبريد الإلكتروني";tabPhone.classList.toggle("active",e);tabEmail.classList.toggle("active",!e);if(e){idLabel.textContent="رقم التليفون";idIcon.textContent="📞";phonePrefix.classList.remove("hidden");idWrap.classList.add("phone");identityInput.type="tel";identityInput.placeholder="رقم التليفون";identityInput.value=""}else{idLabel.textContent="بريد إلكتروني";idIcon.innerHTML=mailSvg;phonePrefix.classList.add("hidden");idWrap.classList.remove("phone");identityInput.type="email";identityInput.placeholder="بريد إلكتروني";identityInput.value=""}confirmGroup.classList.toggle("hidden",!t);inviteGroup.classList.toggle("hidden",!t);primaryBtn.textContent=t?"اشترك":"تسجيل الدخول";secondaryBtn.textContent=t?"تسجيل الدخول":"اشترك"}tabPhone.addEventListener("click",()=>{activeMethod="phone";render()});tabEmail.addEventListener("click",()=>{activeMethod="email";render()});secondaryBtn.addEventListener("click",()=>{activeMode=activeMode==="signup"?"login":"signup";render()});document.querySelectorAll(".toggle-eye").forEach(e=>{e.addEventListener("click",()=>{const t=document.getElementById(e.dataset.target),n=t.type==="password";t.type=n?"text":"password";e.innerHTML=n?eyeOffSvg:eyeSvg})});authForm.addEventListener("submit",e=>{e.preventDefault();const t=identityInput.value.trim(),n=document.getElementById("passwordInput").value.trim(),i=document.getElementById("confirmInput").value.trim();if(!t)return alert(activeMethod==="phone"?"من فضلك أدخل رقم التليفون":"من فضلك أدخل البريد الإلكتروني");if(!n)return alert("من فضلك أدخل كلمة المرور");if(activeMode==="signup"){if(!i)return alert("من فضلك أعد إدخال كلمة المرور");if(n!==i)return alert("كلمتا المرور غير متطابقتين")}location.href="index.html"});render();</script></body></html>
