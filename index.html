addEventListener("submit",async q=>{const f=q.target.closest("[data-auth]");if(!f)return;q.preventDefault();const m=f.querySelector(".msg");m.textContent="";try{if(f.dataset.auth==="login"){await signInWithEmailAndPassword(AU,f.email.value.trim(),f.password.value);go("index")}else{const cr=await createUserWithEmailAndPassword(AU,f.email.value.trim(),f.password.value);const name=f.username.value.trim()||"User";await updateProfile(cr.user,{displayName:name});await setDoc(doc(DB,"users",cr.user.uid),{...D,username:name,lang:S.lang},{merge:1});go("index")}}catch(err){m.textContent=err.message}});
onAuthStateChanged(AU,bindUser);
draw();
</script></body></html>
